name: EVMYulLean fork conformance

# Weekly probe that the pinned lfglabs-dev/EVMYulLean fork still
# satisfies Verity's bridge assumptions: the fork audit and adapter
# report artifacts are in sync, adapter correctness still builds,
# all universal bridge lemmas still build, the native transition harness still
# builds, the public EndToEnd EVMYulLean target still builds, and all 123
# concrete `native_decide` bridge-equivalence tests still pass.
#
# Burn-in: the probe step is captured with `continue-on-error: true`
# during the two-week window starting 2026-04-20 (see issue #1722 plan
# C4 risk analysis). Before 2026-05-04 failures are reported as
# warnings. After that cutoff, scheduled/manual failures open or update
# a tracking issue and the job exits red.

on:
  schedule:
    # Monday 07:23 UTC — off the :00/:30 minute mark to avoid
    # scheduler pile-up with other weekly jobs.
    - cron: '23 7 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/evmyullean-fork-conformance.yml'
      - 'Makefile'
      - 'Compiler/Proofs/EndToEnd.lean'
      - 'scripts/generate_evmyullean_adapter_report.py'
      - 'scripts/generate_evmyullean_fork_audit.py'
      - 'scripts/test_evmyullean_fork_conformance_workflow.py'
      - 'artifacts/evmyullean_fork_audit.json'
      - 'artifacts/evmyullean_adapter_report.json'
      - 'lake-manifest.json'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanAdapter.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanAdapterCorrectness.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanBodyClosure.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanBridgeLemmas.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanBridgeTest.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanNativeHarness.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanNativeSmokeTest.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanRetarget.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanSignedArithSpec.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanSourceExprClosure.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanStateBridge.lean'
      - 'Compiler/Proofs/YulGeneration/ReferenceOracle/Builtins.lean'
      - 'Compiler/Proofs/YulGeneration/ReferenceOracle/Semantics.lean'
  pull_request:
    paths:
      - '.github/workflows/evmyullean-fork-conformance.yml'
      - 'Makefile'
      - 'Compiler/Proofs/EndToEnd.lean'
      - 'scripts/generate_evmyullean_adapter_report.py'
      - 'scripts/generate_evmyullean_fork_audit.py'
      - 'scripts/test_evmyullean_fork_conformance_workflow.py'
      - 'artifacts/evmyullean_fork_audit.json'
      - 'artifacts/evmyullean_adapter_report.json'
      - 'lake-manifest.json'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanAdapter.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanAdapterCorrectness.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanBodyClosure.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanBridgeLemmas.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanBridgeTest.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanNativeHarness.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanNativeSmokeTest.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanRetarget.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanSignedArithSpec.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanSourceExprClosure.lean'
      - 'Compiler/Proofs/YulGeneration/Backends/EvmYulLeanStateBridge.lean'
      - 'Compiler/Proofs/YulGeneration/ReferenceOracle/Builtins.lean'
      - 'Compiler/Proofs/YulGeneration/ReferenceOracle/Semantics.lean'

permissions:
  contents: read

env:
  BURN_IN_END_UTC: '2026-05-04T00:00:00Z'

concurrency:
  group: evmyullean-fork-conformance-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake

      - name: Run EVMYulLean fork conformance probe
        id: probe
        continue-on-error: true
        run: make test-evmyullean-fork

      - name: Report probe outcome
        if: always()
        run: |
          if [ "${{ steps.probe.outcome }}" = "success" ]; then
            echo "::notice::EVMYulLean fork conformance probe passed."
          else
            now_epoch="$(date -u +%s)"
            burn_in_epoch="$(date -u -d "$BURN_IN_END_UTC" +%s)"
            if [ "$now_epoch" -lt "$burn_in_epoch" ]; then
              echo "::warning::EVMYulLean fork conformance probe failed during burn-in window (ends $BURN_IN_END_UTC). Investigate locally with 'make test-evmyullean-fork'."
            else
              echo "::error::EVMYulLean fork conformance probe failed after burn-in. Investigate locally with 'make test-evmyullean-fork'."
            fi
          fi

      - name: Fail after burn-in conformance failure
        if: steps.probe.outcome != 'success'
        run: |
          now_epoch="$(date -u +%s)"
          burn_in_epoch="$(date -u -d "$BURN_IN_END_UTC" +%s)"
          if [ "$now_epoch" -ge "$burn_in_epoch" ]; then
            exit 1
          fi

  open-drift-issue:
    needs: probe
    if: always() && needs.probe.result == 'failure' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update drift issue
        uses: actions/github-script@v7
        env:
          BURN_IN_END_UTC: ${{ env.BURN_IN_END_UTC }}
        with:
          script: |
            const burnInEnd = Date.parse(process.env.BURN_IN_END_UTC);
            if (!Number.isFinite(burnInEnd)) {
              throw new Error(`Invalid BURN_IN_END_UTC: ${process.env.BURN_IN_END_UTC}`);
            }
            if (Date.now() < burnInEnd) {
              core.notice(`EVMYulLean probe failed during burn-in; no issue opened until ${process.env.BURN_IN_END_UTC}.`);
              return;
            }

            const marker = "<!-- evmyullean-fork-conformance-failure -->";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = "EVMYulLean fork conformance probe failed";
            const bodyLines = [
              marker,
              "The EVMYulLean fork conformance probe failed after the burn-in window.",
              "",
              `Run: ${runUrl}`,
              `Workflow: ${context.workflow}`,
              `Ref: ${context.ref}`,
              `SHA: ${context.sha}`,
              "",
              "Local triage:",
              "```bash",
              "make test-evmyullean-fork",
              "```",
              "",
              "This guard checks the pinned EVMYulLean fork audit, checks the adapter report, rebuilds adapter correctness, the native transition harness, and the public EndToEnd target, and runs the concrete bridge-equivalence tests."
            ];
            const body = bodyLines.join("\n");

            const query = `repo:${owner}/${repo} is:issue is:open in:title "${title}"`;
            const search = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 10
            });
            const existing = search.data.items.find((item) =>
              item.title === title && !item.pull_request
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
              core.notice(`Updated existing conformance issue #${existing.number}.`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
              core.notice(`Created conformance issue #${created.data.number}.`);
            }
