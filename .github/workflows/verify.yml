name: Verify proofs

on:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches: [main]
    paths:
      - '.github/actions/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/**'
      - '.github/workflows/verify.yml'
      - 'artifacts/**'
      - 'Verity/**'
      - 'Verity.lean'
      - 'Compiler/**'
      - 'Compiler.lean'
      - 'Contracts/**'
      - 'Contracts.lean'
      - 'examples/**'
      - 'packages/**'
      - 'test/**'
      - 'scripts/**'
      - 'docs/**'
      - 'docs-site/**'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - 'foundry.toml'
      - 'Makefile'
      - 'AXIOMS.md'
      - 'README.md'
      - 'TRUST_ASSUMPTIONS.md'
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/**'
      - '.github/workflows/verify.yml'
      - 'artifacts/**'
      - 'Verity/**'
      - 'Verity.lean'
      - 'Compiler/**'
      - 'Compiler.lean'
      - 'Contracts/**'
      - 'Contracts.lean'
      - 'examples/**'
      - 'packages/**'
      - 'test/**'
      - 'scripts/**'
      - 'docs/**'
      - 'docs-site/**'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - 'foundry.toml'
      - 'Makefile'
      - 'AXIOMS.md'
      - 'README.md'
      - 'TRUST_ASSUMPTIONS.md'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Ignore persisted Lake build state and run a fresh CI build with larger timeouts'
        required: false
        default: false
        type: boolean
      force_full_run:
        description: 'Bypass change filters and run the full verification workflow for prewarming or manual validation'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  SOLC_VERSION: "0.8.33"
  SOLC_URL: "https://binaries.soliditylang.org/linux-amd64/solc-linux-amd64-v0.8.33+commit.64118f21"
  SOLC_SHA256: "1274e5c4621ae478090c5a1f48466fd3c5f658ed9e14b15a0b213dc806215468"
  VERIFY_CLEAN_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.clean_build && 'true' || 'false' }}
  VERIFY_FORCE_FULL_RUN: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_full_run)) && 'true' || 'false' }}
  VERIFY_USE_STICKY_DISKS: ${{ (github.event_name == 'workflow_dispatch' && inputs.clean_build) && 'false' || 'true' }}
  VERIFY_DISABLE_LAKE_CACHE_RESTORE: ${{ github.event_name == 'workflow_dispatch' && inputs.clean_build && 'true' || 'false' }}
  VERIFY_CACHE_BUCKET: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('ref-{0}', github.ref_name) }}
  VERIFY_MAIN_CACHE_BUCKET: ref-main
  VERIFY_LOCAL_ARTIFACT_ROOT: /srv/verity-ci-cache/artifacts

jobs:
  changes:
    runs-on: [self-hosted, linux, x64, verity, fastlane]
    timeout-minutes: 5
    outputs:
      code: ${{ steps.effective.outputs.code }}
      build: ${{ steps.effective.outputs.build }}
      compiler: ${{ steps.effective.outputs.compiler }}
      macro_fuzz: ${{ steps.effective.outputs.macro_fuzz }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '.github/actions/**'
              - '.github/workflows/verify.yml'
              - 'Verity/**'
              - 'Verity.lean'
              - 'Compiler/**'
              - 'Compiler.lean'
              - 'Contracts/**'
              - 'Contracts.lean'
              - 'examples/**'
              - 'packages/**'
              - 'test/**'
              - 'scripts/**'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'foundry.toml'
            build:
              - '.github/actions/**'
              - 'Verity/**'
              - 'Verity.lean'
              - 'Compiler/**'
              - 'Compiler.lean'
              - 'Contracts/**'
              - 'Contracts.lean'
              - 'examples/**'
              - 'packages/**'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
            compiler:
              - '.github/actions/**'
              - 'Verity/**'
              - '!Verity/Proofs/**'
              - 'Compiler/**'
              - '!Compiler/Proofs/**'
              - 'Compiler.lean'
              - 'Contracts/**'
              - '!Contracts/**/Proofs/**'
              - 'Contracts.lean'
              - 'examples/**'
              - 'packages/**'
              - 'test/**'
              - 'scripts/check_gas.py'
              - 'scripts/check_patch_gas_delta.py'
              - 'scripts/check_selectors.py'
              - 'scripts/check_yul.py'
              - 'scripts/keccak256.py'
              - 'scripts/lean_cc_ccache_clang.sh'
              - 'scripts/property_utils.py'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'foundry.toml'
            macro_fuzz:
              - '.github/actions/setup-lean/action.yml'
              - 'Verity/Macro/**'
              - 'Compiler/**'
              - '!Compiler/Proofs/**'
              - 'Compiler.lean'
              - 'Contracts/**'
              - '!Contracts/**/Proofs/**'
              - 'Contracts.lean'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
      - name: Resolve effective change flags
        id: effective
        env:
          FORCE_FULL_RUN: ${{ env.VERIFY_FORCE_FULL_RUN }}
          CODE_CHANGED: ${{ steps.filter.outputs.code }}
          BUILD_CHANGED: ${{ steps.filter.outputs.build }}
          COMPILER_CHANGED: ${{ steps.filter.outputs.compiler }}
          MACRO_FUZZ_CHANGED: ${{ steps.filter.outputs.macro_fuzz }}
        run: |
          if [ "$FORCE_FULL_RUN" = "true" ]; then
            code=true
            build=true
            compiler=true
            macro_fuzz=true
          else
            code="$CODE_CHANGED"
            build="$BUILD_CHANGED"
            compiler="$COMPILER_CHANGED"
            macro_fuzz="$MACRO_FUZZ_CHANGED"
          fi

          {
            echo "code=$code"
            echo "build=$build"
            echo "compiler=$compiler"
            echo "macro_fuzz=$macro_fuzz"
          } >> "$GITHUB_OUTPUT"

  checks:
    runs-on: [self-hosted, linux, x64, verity, fastlane]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Clear sticky remote refs before PR checkout
        if: github.event_name == 'pull_request'
        run: |
          if [ -d .git ]; then
            git for-each-ref --format='delete %(refname)' refs/remotes/origin | git update-ref --stdin || true
            rm -rf .git/refs/remotes/origin
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
          token: ${{ github.token }}

      - name: Regenerate derived artifacts
        run: |
          python3 scripts/generate_verification_status.py
          python3 scripts/generate_layer2_boundary_catalog.py
          python3 scripts/generate_verify_sync_spec.py
          python3 scripts/generate_evmyullean_capability_report.py
          python3 scripts/generate_evmyullean_adapter_report.py
          python3 scripts/generate_print_axioms.py
          python3 scripts/sync_verification_status_doc.py

      - name: Auto-commit refreshed artifacts
        if: github.event_name == 'pull_request'
        run: |
          git diff --quiet || {
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: auto-refresh derived artifacts"
            git push
          }

      - name: Run all checks
        run: make check

  timeout-watchdog:
    runs-on: [self-hosted, linux, x64, verity, fastlane]
    timeout-minutes: 5
    needs: checks
    if: needs.checks.result == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.clean_build)
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Warn on timeout-risk trend
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/ci_timeout_watchdog.py \
            --repo ${{ github.repository }} \
            --workflow verify.yml \
            --branch ${{ github.event.pull_request.base.ref || github.ref_name }}

  build:
    runs-on: [self-hosted, linux, x64, verity, build]
    timeout-minutes: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.clean_build && '60' || '35') }}
    needs: [changes, checks]
    if: needs.checks.result == 'success' && needs.changes.outputs.build == 'true'
    env:
      LEAN_NUM_THREADS: 8
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cleanup stale local artifacts
        run: scripts/ci_local_persistence.sh cleanup --max-age-hours 24

      - name: Setup Lean
        id: setup-lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake
          use-sticky-disks: ${{ env.VERIFY_USE_STICKY_DISKS }}
          sticky-disk-key-prefix: verify
          lake-packages-sticky-key: lake-packages-verify-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          lake-packages-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('lake-packages-verify-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          use-build-sticky-disk: ${{ env.VERIFY_USE_STICKY_DISKS }}
          build-sticky-disk-key: verify-build-base-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          build-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('verify-build-base-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          disable-lake-cache-restore: ${{ env.VERIFY_DISABLE_LAKE_CACHE_RESTORE }}
          cache-primary-key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}

      - name: Build and verify all proofs
        run: |
          set -o pipefail
          lake build 2>&1 | tee lake-build.log

      - name: Check Lean warning non-regression
        run: python3 scripts/check_lean_warning_regression.py --log lake-build.log

      - name: Prebuild shared audit Lean targets
        run: |
          set -o pipefail
          lake build PrintAxioms 2>&1 | tee -a lake-build.log

      - name: Package prepared Lean workspace build
        run: tar -hcf lean-workspace-build.tar .lake/build .lake/lakefile.olean .lake/lakefile.olean.trace

      - name: Publish Lean workspace build locally
        run: |
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name lean-workspace-build \
            --path lean-workspace-build.tar

      - name: Upload prepared Lean workspace build
        uses: actions/upload-artifact@v7
        with:
          name: lean-workspace-build
          path: lean-workspace-build.tar

      - name: Save current run Lake cache
        if: success() && needs.changes.outputs.build == 'true' && steps.setup-lean.outputs.using-sticky-disks != 'true'
        uses: actions/cache/save@v5
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}

      - name: Save Lake packages cache
        if: success() && needs.changes.outputs.build == 'true' && steps.setup-lean.outputs.using-sticky-disks != 'true' && steps.setup-lean.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}

  prepare-macro-fuzz:
    runs-on: [self-hosted, linux, x64, verity, build]
    timeout-minutes: 360
    needs: [changes, checks, build]
    if: needs.checks.result == 'success' && needs.build.result == 'success' && needs.changes.outputs.macro_fuzz == 'true'
    env:
      LEAN_NUM_THREADS: 8
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake
          use-sticky-disks: ${{ env.VERIFY_USE_STICKY_DISKS }}
          sticky-disk-key-prefix: verify
          lake-packages-sticky-key: lake-packages-verify-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          lake-packages-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('lake-packages-verify-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          use-build-sticky-disk: ${{ env.VERIFY_USE_STICKY_DISKS }}
          build-sticky-disk-key: verify-build-macro-fuzz-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          build-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('verify-build-macro-fuzz-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          disable-lake-cache-restore: ${{ env.VERIFY_DISABLE_LAKE_CACHE_RESTORE }}
          cache-primary-key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}

      - name: Download prepared Lean workspace build
        uses: actions/download-artifact@v7
        with:
          name: lean-workspace-build

      - name: Restore prepared Lean workspace build
        run: tar -xf lean-workspace-build.tar

      - name: Build macro round-trip fuzz executable
        run: |
          for attempt in 1 2 3; do
            if stdbuf -oL -eL lake build macro-roundtrip-fuzz; then
              exit 0
            fi
            echo "::warning::lake build attempt $attempt failed; retrying in 10s"
            sleep 10
          done
          echo "::error::lake build failed after 3 attempts"
          exit 1

      - name: Package macro-fuzz Lean workspace build
        run: tar -hcf lean-workspace-macro-fuzz-build.tar .lake/build .lake/lakefile.olean .lake/lakefile.olean.trace

      - name: Publish macro-fuzz build locally
        run: |
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name lean-workspace-macro-fuzz-build \
            --path lean-workspace-macro-fuzz-build.tar

      - name: Upload macro-fuzz Lean workspace build
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: lean-workspace-macro-fuzz-build
          path: lean-workspace-macro-fuzz-build.tar

  build-audits:
    runs-on: [self-hosted, linux, x64, verity, build]
    timeout-minutes: 20
    needs: [changes, checks, build]
    if: needs.checks.result == 'success' && needs.build.result == 'success' && needs.changes.outputs.build == 'true'
    env:
      LEAN_NUM_THREADS: 4
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake
          use-sticky-disks: ${{ env.VERIFY_USE_STICKY_DISKS }}
          sticky-disk-key-prefix: verify
          lake-packages-sticky-key: lake-packages-verify-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          lake-packages-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('lake-packages-verify-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          disable-lake-cache-restore: ${{ env.VERIFY_DISABLE_LAKE_CACHE_RESTORE }}
          cache-primary-key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}

      - name: Download prepared Lean workspace build
        uses: actions/download-artifact@v7
        with:
          name: lean-workspace-build

      - name: Restore prepared Lean workspace build
        run: tar -xf lean-workspace-build.tar

      - name: Build split Lake packages independently
        run: python3 scripts/check_split_package_builds.py

      - name: Check macro round-trip fuzz coverage
        run: python3 scripts/check_macro_roundtrip_fuzz_coverage.py

      - name: Check for axioms in proof files
        run: |
          echo "Checking for axioms in Compiler/ and Verity/..."
          grep -rnE "^(private |protected )?axiom " Compiler/ Verity/ --include="*.lean" | tee axioms.txt || true
          AXIOM_COUNT=$(wc -l < axioms.txt 2>/dev/null | tr -d ' ')
          echo "Found $AXIOM_COUNT axiom declaration(s)"
          if [ "$AXIOM_COUNT" -gt 0 ]; then
            echo "::warning::Found $AXIOM_COUNT axiom(s) in proof files"
            if [ ! -f "AXIOMS.md" ]; then
              echo "::error::AXIOMS.md not found. All axioms must be documented."
              exit 1
            fi
            AXIOM_NAMES=$(sed -E 's/.*:(private |protected )?axiom ([a-zA-Z0-9_]*).*/\2/' axioms.txt | sort -u)
            UNDOCUMENTED=""
            for axiom_name in $AXIOM_NAMES; do
              if ! grep -q "$axiom_name" AXIOMS.md; then
                echo "::error::Axiom '$axiom_name' not documented in AXIOMS.md"
                UNDOCUMENTED="$UNDOCUMENTED $axiom_name"
              else
                echo "✓ Axiom '$axiom_name' is documented"
              fi
            done
            if [ -n "$UNDOCUMENTED" ]; then
              echo "::error::Undocumented axioms:$UNDOCUMENTED"
              exit 1
            fi
            echo "✓ All $AXIOM_COUNT axioms are documented in AXIOMS.md"
          else
            echo "✓ No axioms found in proof files"
          fi

      - name: Build proof modules for axiom audit
        run: lake build PrintAxioms

      - name: Generate axiom dependency report
        run: |
          set -o pipefail
          lake env lean PrintAxioms.lean 2>&1 | tee axiom-report-raw.log
          AXIOM_REPORT_FILE=axiom-report.md python3 scripts/check_axioms.py --log axiom-report-raw.log | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Generate proof length report
        run: python3 scripts/check_proof_length.py --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Generate property coverage report
        run: python3 scripts/report_property_coverage.py --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Generate storage layout report
        run: python3 scripts/check_storage_layout.py --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload axiom dependency report
        uses: actions/upload-artifact@v7
        with:
          name: axiom-dependency-report
          path: |
            axiom-report.md
            axiom-report-raw.log

  macro-fuzz:
    runs-on: [self-hosted, linux, x64, verity, build]
    timeout-minutes: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.clean_build && '150' || '90') }}
    needs: [changes, checks, prepare-macro-fuzz]
    if: needs.checks.result == 'success' && needs.prepare-macro-fuzz.result == 'success' && needs.changes.outputs.macro_fuzz == 'true'
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard_index: [0, 1, 2, 3]
    env:
      LEAN_NUM_THREADS: 8
      MACRO_FUZZ_SHARD_INDEX: ${{ matrix.shard_index }}
      MACRO_FUZZ_SHARD_COUNT: 4
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Lean
        id: setup-lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake
          use-sticky-disks: ${{ env.VERIFY_USE_STICKY_DISKS }}
          sticky-disk-key-prefix: verify
          lake-packages-sticky-key: lake-packages-verify-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          lake-packages-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('lake-packages-verify-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          disable-lake-cache-restore: ${{ env.VERIFY_DISABLE_LAKE_CACHE_RESTORE }}
          cache-primary-key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}

      - name: Restore macro-fuzz build (local)
        id: local-restore-macro-fuzz
        continue-on-error: true
        run: |
          scripts/ci_local_persistence.sh fetch \
            --run-id "${{ github.run_id }}" \
            --name lean-workspace-macro-fuzz-build \
            --timeout 30

      - name: Download prepared Lean workspace build (fallback)
        if: steps.local-restore-macro-fuzz.outcome != 'success'
        uses: actions/download-artifact@v7
        with:
          name: lean-workspace-macro-fuzz-build

      - name: Restore prepared Lean workspace build (fallback)
        if: steps.local-restore-macro-fuzz.outcome != 'success'
        run: tar -xf lean-workspace-macro-fuzz-build.tar

      - name: Run macro round-trip fuzz harness
        run: |
          chmod +x ./.lake/build/bin/macro-roundtrip-fuzz
          ./.lake/build/bin/macro-roundtrip-fuzz

  build-compiler-binaries:
    runs-on: [self-hosted, linux, x64, verity, build]
    timeout-minutes: 360
    needs: [changes, checks, build]
    if: needs.checks.result == 'success' && needs.build.result == 'success' && needs.changes.outputs.compiler == 'true'
    env:
      LEAN_NUM_THREADS: 8
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_NOHASHDIR: "true"
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 2G
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Lean
        id: setup-lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake-compiler
          use-sticky-disks: ${{ env.VERIFY_USE_STICKY_DISKS }}
          sticky-disk-key-prefix: verify-compiler
          lake-packages-sticky-key: lake-packages-verify-compiler-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          lake-packages-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('lake-packages-verify-compiler-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          use-build-sticky-disk: ${{ env.VERIFY_USE_STICKY_DISKS }}
          build-sticky-disk-key: verify-build-compiler-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          build-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('verify-build-compiler-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          disable-lake-cache-restore: ${{ env.VERIFY_DISABLE_LAKE_CACHE_RESTORE }}
          cache-primary-key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}
          cache-extra-restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}

      - name: Ensure compiler acceleration toolchain
        run: |
          if \
            command -v clang >/dev/null && \
            command -v clang++ >/dev/null && \
            command -v ld.lld >/dev/null && \
            command -v ccache >/dev/null && \
            printf 'int main() { return 0; }\n' | clang++ -x c++ - -fuse-ld=lld -stdlib=libc++ -lc++abi -o /tmp/verity-clang-smoke >/dev/null 2>&1 && \
            printf 'int main() { return 0; }\n' | clang -x c - -fuse-ld=lld -luv -o /tmp/verity-libuv-smoke >/dev/null 2>&1
          then
            clang --version
            ld.lld --version
            ccache --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y clang lld ccache libc++-dev libc++abi-dev libgmp-dev libuv1-dev

          printf 'int main() { return 0; }\n' | clang++ -x c++ - -fuse-ld=lld -stdlib=libc++ -lc++abi -o /tmp/verity-clang-smoke
          printf 'int main() { return 0; }\n' | clang -x c - -fuse-ld=lld -luv -o /tmp/verity-libuv-smoke

          clang --version
          ld.lld --version
          ccache --version

      - name: Prepare ccache directory
        run: mkdir -p "$CCACHE_DIR"

      - name: Restore compiler ccache fallback cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/compiler-ccache-cache
          key: compiler-ccache-cache-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}
          restore-keys: |
            compiler-ccache-cache-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-
            compiler-ccache-cache-${{ env.VERIFY_MAIN_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-

      - name: Attach persistent compiler ccache directory
        if: env.VERIFY_USE_STICKY_DISKS == 'true'
        run: |
          scripts/ci_local_persistence.sh mount \
            --root "/srv/verity-ci-cache/compiler-ccache" \
            --key "compiler-ccache-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}" \
            --path "$CCACHE_DIR" \
            --fallback-key "${{ github.event_name == 'pull_request' && format('compiler-ccache-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}"

      - name: Seed compiler ccache from GitHub cache fallback
        run: |
          if find "$CCACHE_DIR" -mindepth 1 -print -quit | grep -q .; then
            exit 0
          fi
          if ! find "$RUNNER_TEMP/compiler-ccache-cache" -mindepth 1 -print -quit | grep -q .; then
            exit 0
          fi
          cp -a "$RUNNER_TEMP/compiler-ccache-cache/." "$CCACHE_DIR/"

      - name: Download prepared Lean workspace build
        uses: actions/download-artifact@v7
        with:
          name: lean-workspace-build

      - name: Restore prepared Lean workspace build
        run: tar -xf lean-workspace-build.tar

      - name: Reset ccache statistics
        run: ccache -z

      - name: Build verity-compiler
        uses: ./.github/actions/build-compiler-target
        with:
          checkpoint-key: verity-compiler
          lake-targets: |
            verity-compiler
          use-lean-cc: "true"
          expected-paths: |
            .lake/build/bin/verity-compiler

      - name: Build verity-compiler-patched
        uses: ./.github/actions/build-compiler-target
        with:
          checkpoint-key: verity-compiler-patched
          lake-targets: |
            verity-compiler-patched
          use-lean-cc: "true"
          expected-paths: |
            .lake/build/bin/verity-compiler-patched

      - name: Build difftest-interpreter
        uses: ./.github/actions/build-compiler-target
        with:
          checkpoint-key: difftest-interpreter
          lake-targets: |
            difftest-interpreter
          use-lean-cc: "true"
          expected-paths: |
            .lake/build/bin/difftest-interpreter

      - name: Build gas-report
        uses: ./.github/actions/build-compiler-target
        with:
          checkpoint-key: gas-report
          lake-targets: |
            gas-report
          use-lean-cc: "true"
          expected-paths: |
            .lake/build/bin/gas-report

      - name: Build example contracts manifest
        id: build-examples
        shell: bash
        env:
          LEAN_CC: ${{ github.workspace }}/scripts/lean_cc_ccache_clang.sh
        run: |
          set -euo pipefail
          checkpoint_dir=".lake/build/ci-checkpoints"
          marker="${checkpoint_dir}/verity-example-contracts.done"
          mkdir -p "${checkpoint_dir}"

          if [ -f "${marker}" ]; then
            echo "Example contract checkpoint already satisfied; skipping build."
            exit 0
          fi

          mapfile -t manifest_targets < <(grep -v '^[[:space:]]*#' packages/verity-examples/contracts.manifest | sed '/^[[:space:]]*$/d')
          if [ "${#manifest_targets[@]}" -eq 0 ]; then
            echo "::error::Example contracts manifest is empty."
            exit 1
          fi

          stdbuf -oL -eL lake build "${manifest_targets[@]}"
          touch "${marker}"

      - name: Show compiler ccache statistics
        if: always()
        run: ccache -s

      - name: Save compiler ccache fallback cache
        if: always() && (failure() || steps.setup-lean.outputs.using-sticky-disks != 'true')
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.cache/ccache
          key: compiler-ccache-cache-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}

      - name: Package compiler binaries
        run: |
          mkdir -p compiler/bin
          cp ./.lake/build/bin/verity-compiler compiler/bin/
          cp ./.lake/build/bin/verity-compiler-patched compiler/bin/
          cp ./.lake/build/bin/difftest-interpreter compiler/bin/

      - name: Generate Yul (all contracts + CryptoHash with linked libraries)
        run: |
          ./compiler/bin/verity-compiler \
            --manifest packages/verity-examples/contracts.manifest \
            --output compiler/yul \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Pre-build LocalObligationMacroSmoke Yul (unpatched)
        run: |
          set -euo pipefail
          artifact="compiler/yul/LocalObligationMacroSmoke.yul"
          if [ -f "${artifact}" ]; then
            exit 0
          fi
          lake build Contracts.LocalObligationMacroSmoke.LocalObligationMacroSmoke >/dev/null
          ./compiler/bin/verity-compiler \
            --module Contracts.LocalObligationMacroSmoke.LocalObligationMacroSmoke \
            --output compiler/yul >/dev/null

      - name: Pre-build smoke test Yul artifacts (unpatched)
        run: |
          set -euo pipefail
          smoke_modules=(
            Contracts.BytesEqSmoke
            Contracts.Smoke.LowLevelTryCatchSmoke
            Contracts.Smoke.SelfBalanceSmoke
            Contracts.StringArrayErrorSmoke
            Contracts.StringArrayEventSmoke
            Contracts.StringEqSmoke
            Contracts.StringErrorSmokeContract
            Contracts.StringEventSmoke
            Contracts.StringSmoke
          )
          lake build "${smoke_modules[@]}" >/dev/null
          mkdir -p compiler/yul-smoke
          for module in "${smoke_modules[@]}"; do
            ./compiler/bin/verity-compiler \
              --module "$module" \
              --output compiler/yul-smoke >/dev/null
          done

      - name: Generate patched Yul + patch coverage report
        run: |
          ./compiler/bin/verity-compiler-patched \
            --manifest packages/verity-examples/contracts.manifest \
            --enable-patches \
            --patch-report compiler/patch-report.tsv \
            --output compiler/yul-patched \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Pre-build patched LocalObligationMacroSmoke Yul for foundry-patched
        run: |
          set -euo pipefail
          artifact="compiler/yul-patched/LocalObligationMacroSmoke.yul"
          if [ -f "${artifact}" ]; then
            exit 0
          fi
          ./compiler/bin/verity-compiler-patched \
            --module Contracts.LocalObligationMacroSmoke.LocalObligationMacroSmoke \
            --output compiler/yul-patched \
            --enable-patches >/dev/null

      - name: Pre-build patched smoke test Yul artifacts for foundry-patched
        run: |
          set -euo pipefail
          smoke_modules=(
            Contracts.BytesEqSmoke
            Contracts.Smoke.LowLevelTryCatchSmoke
            Contracts.Smoke.SelfBalanceSmoke
            Contracts.StringArrayErrorSmoke
            Contracts.StringArrayEventSmoke
            Contracts.StringEqSmoke
            Contracts.StringErrorSmokeContract
            Contracts.StringEventSmoke
            Contracts.StringSmoke
          )
          mkdir -p compiler/yul-patched-smoke
          for module in "${smoke_modules[@]}"; do
            ./compiler/bin/verity-compiler-patched \
              --module "$module" \
              --output compiler/yul-patched-smoke \
              --enable-patches >/dev/null
          done

      - name: Save static gas report snapshot
        run: lake exe gas-report --manifest packages/verity-examples/contracts.manifest > gas-report-static.tsv

      - name: Save patched static gas report snapshot
        run: lake exe gas-report --manifest packages/verity-examples/contracts.manifest --enable-patches --patch-max-iterations 2 > gas-report-static-patched.tsv

      - name: Package compiler workspace build
        run: tar -hcf lean-workspace-compiler-build.tar .lake/build

      - name: Publish compiler workspace build locally
        run: |
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name lean-workspace-compiler-build \
            --path lean-workspace-compiler-build.tar

      - name: Publish compiler binaries locally
        run: |
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name verity-compiler-binaries \
            --path compiler/bin

      - name: Publish difftest interpreter locally
        run: |
          staging="${RUNNER_TEMP}/difftest-interpreter-artifact-${{ github.run_id }}"
          mkdir -p "$staging"
          cp .lake/build/bin/difftest-interpreter "$staging/"
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name difftest-interpreter \
            --path "$staging"

      - name: Publish generated Yul locally
        run: |
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name generated-yul \
            --path compiler/yul

      - name: Publish patched Yul locally
        run: |
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name generated-yul-patched \
            --path compiler/yul-patched

      - name: Publish smoke Yul locally
        run: |
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name generated-yul-smoke \
            --path compiler/yul-smoke

      - name: Publish patched smoke Yul locally
        run: |
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name generated-yul-patched-smoke \
            --path compiler/yul-patched-smoke

      - name: Publish gas reports locally
        run: |
          staging="${RUNNER_TEMP}/gas-reports-${{ github.run_id }}"
          mkdir -p "$staging"
          cp gas-report-static.tsv "$staging/"
          cp gas-report-static-patched.tsv "$staging/"
          cp compiler/patch-report.tsv "$staging/"
          scripts/ci_local_persistence.sh publish \
            --run-id "${{ github.run_id }}" \
            --name gas-reports \
            --path "$staging"

      - name: Upload difftest interpreter
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: difftest-interpreter
          path: .lake/build/bin/difftest-interpreter

      - name: Upload compiler binaries
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: verity-compiler-binaries
          path: compiler/bin
          compression-level: 0

      - name: Upload compiler workspace build
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: lean-workspace-compiler-build
          path: lean-workspace-compiler-build.tar
          compression-level: 0

      - name: Upload generated Yul
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: generated-yul
          path: compiler/yul

      - name: Upload patched Yul
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: generated-yul-patched
          path: compiler/yul-patched

      - name: Upload smoke Yul
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: generated-yul-smoke
          path: compiler/yul-smoke

      - name: Upload patched smoke Yul
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: generated-yul-patched-smoke
          path: compiler/yul-patched-smoke

      - name: Upload patch coverage report
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: patch-coverage-report
          path: compiler/patch-report.tsv

      - name: Upload static gas report
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: static-gas-report
          path: gas-report-static.tsv

      - name: Upload patched static gas report
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: static-gas-report-patched
          path: gas-report-static-patched.tsv

  compiler-audits:
    runs-on: [self-hosted, linux, x64, verity, build]
    timeout-minutes: 45
    needs: [changes, checks, build, build-compiler-binaries]
    if: needs.checks.result == 'success' && needs.build.result == 'success' && needs.build-compiler-binaries.result == 'success' && needs.changes.outputs.compiler == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake-compiler
          use-sticky-disks: ${{ env.VERIFY_USE_STICKY_DISKS }}
          sticky-disk-key-prefix: verify-compiler
          lake-packages-sticky-key: lake-packages-verify-compiler-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          lake-packages-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('lake-packages-verify-compiler-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          disable-lake-cache-restore: ${{ env.VERIFY_DISABLE_LAKE_CACHE_RESTORE }}
          cache-primary-key: lake-compiler-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}
          cache-extra-restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}

      - name: Download prepared Lean workspace build
        uses: actions/download-artifact@v7
        with:
          name: lean-workspace-build

      - name: Restore prepared Lean workspace build
        run: tar -xf lean-workspace-build.tar

      - name: Download compiler workspace build
        uses: actions/download-artifact@v7
        with:
          name: lean-workspace-compiler-build

      - name: Restore compiler workspace build
        run: tar -xf lean-workspace-compiler-build.tar

      - name: Restore generated Yul (local)
        id: local-restore-yul
        continue-on-error: true
        run: |
          source_dir="${VERIFY_LOCAL_ARTIFACT_ROOT}/${{ github.run_id }}/generated-yul"
          if [ -f "$source_dir/.ready" ]; then
            mkdir -p compiler/yul
            cp -a "$source_dir/." compiler/yul/
            rm -f compiler/yul/.ready
          else
            exit 1
          fi

      - name: Download generated Yul (fallback)
        if: steps.local-restore-yul.outcome != 'success'
        uses: actions/download-artifact@v7
        with:
          name: generated-yul
          path: compiler/yul

      - name: Restore patched Yul (local)
        id: local-restore-yul-patched
        continue-on-error: true
        run: |
          source_dir="${VERIFY_LOCAL_ARTIFACT_ROOT}/${{ github.run_id }}/generated-yul-patched"
          if [ -f "$source_dir/.ready" ]; then
            mkdir -p compiler/yul-patched
            cp -a "$source_dir/." compiler/yul-patched/
            rm -f compiler/yul-patched/.ready
          else
            exit 1
          fi

      - name: Download patched Yul (fallback)
        if: steps.local-restore-yul-patched.outcome != 'success'
        uses: actions/download-artifact@v7
        with:
          name: generated-yul-patched
          path: compiler/yul-patched

      - name: Download static gas report
        uses: actions/download-artifact@v7
        with:
          name: static-gas-report

      - name: Download patched static gas report
        uses: actions/download-artifact@v7
        with:
          name: static-gas-report-patched

      - name: Download patch coverage report
        uses: actions/download-artifact@v7
        with:
          name: patch-coverage-report
          path: compiler

      - name: Download compiler binaries
        uses: actions/download-artifact@v7
        with:
          name: verity-compiler-binaries
          path: compiler/bin

      - name: Restore compiler executable bits
        run: chmod +x compiler/bin/verity-compiler compiler/bin/verity-compiler-patched compiler/bin/difftest-interpreter

      - name: Setup solc
        uses: ./.github/actions/setup-solc

      # Parity-pack CI steps removed: Morpho-specific parity packs extracted to morpho-verity.
      # External parity packs should run their own CI identity checks.

      - name: Check static gas model coverage on generated Yul (baseline + patched)
        run: |
          python3 scripts/check_gas.py coverage \
            --dir compiler/yul \
            --dir compiler/yul-patched

      - name: Keccak-256 self-test (validate hash implementation)
        run: python3 scripts/keccak256.py --self-test

      - name: Check selector hashing against specs
        run: python3 scripts/check_selectors.py --check-fixtures

      - name: Check generated Yul invariants
        run: |
          python3 scripts/check_yul.py \
            --dir compiler/yul \
            --dir compiler/yul-patched \
            --require-same-files compiler/yul compiler/yul-patched

      - name: Check static gas report invariants
        run: python3 scripts/check_gas.py report

      - name: Check static gas patch delta non-regression
        run: |
          python3 scripts/check_patch_gas_delta.py \
            --baseline-report gas-report-static.tsv \
            --patched-report gas-report-static-patched.tsv \
            --min-improved-contracts 0 \
            --summary-markdown patch-gas-delta-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize patch coverage report
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import csv
          from collections import defaultdict
          path = "compiler/patch-report.tsv"
          rows = list(csv.DictReader(open(path), delimiter="\t"))
          totals = defaultdict(int)
          contracts = defaultdict(int)
          for row in rows:
            patch = row["patch_name"]
            if patch == "-":
              continue
            match_count = int(row["match_count"])
            totals[patch] += match_count
            contracts[patch] += 1
          print("### Patch Coverage")
          if not totals:
            print("No patch rules fired in this run.")
          else:
            print("| Patch | Total Matches | Contracts |")
            print("| :-- | --: | --: |")
            for patch, total in sorted(totals.items(), key=lambda kv: kv[1], reverse=True):
              print(f"| `{patch}` | {total} | {contracts[patch]} |")
          PY

      # Parity-pack identity report upload removed (see above).

  compiler-regressions:
