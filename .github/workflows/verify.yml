        run: stdbuf -oL -eL lake build Compiler.CompilationModelFeatureTest

  lean-profile:
    runs-on: [self-hosted, linux, x64, verity, build]
    timeout-minutes: 45
    needs: changes
    if: github.event_name == 'workflow_dispatch' && needs.changes.outputs.build == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Lean
        uses: ./.github/actions/setup-lean
        with:
          use-sticky-disks: ${{ env.VERIFY_USE_STICKY_DISKS }}
          sticky-disk-key-prefix: verify
          lake-packages-sticky-key: lake-packages-verify-${{ env.VERIFY_CACHE_BUCKET }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          lake-packages-main-fallback-sticky-key: ${{ github.event_name == 'pull_request' && format('lake-packages-verify-{0}-{1}-{2}-{3}-{4}', env.VERIFY_MAIN_CACHE_BUCKET, runner.os, hashFiles('lean-toolchain'), hashFiles('lakefile.lean'), hashFiles('lake-manifest.json')) || '' }}
          disable-lake-cache-restore: ${{ env.VERIFY_DISABLE_LAKE_CACHE_RESTORE }}

      - name: Profile Lean module timings
        run: python3 scripts/profile_lean_modules.py --output lean-perf-queue.md

      - name: Publish Lean profiling summary
        run: cat lean-perf-queue.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lean perf queue
        uses: actions/upload-artifact@v7
        with:
          name: lean-perf-queue
          path: lean-perf-queue.md

  foundry-gas-calibration:
    runs-on: [self-hosted, linux, x64, verity, build]
    timeout-minutes: 15
    needs: [changes, build-compiler-binaries]
    if: needs.changes.outputs.compiler == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download static gas report
        uses: actions/download-artifact@v7
        with:
          name: static-gas-report

      - name: Verify Lake package integrity
        run: |
          shopt -s nullglob
          for pkg_git in .lake/packages/*/.git; do
            pkg="$(dirname "$pkg_git")"
            if ! git -C "$pkg" rev-parse HEAD >/dev/null 2>&1; then
              echo "::warning::Removing corrupted Lake package: $pkg"
              rm -rf "$pkg"
            fi
          done

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry
        with:
          local-artifact-run-id: ${{ github.run_id }}

      - name: Verify solc can compile Yul artifacts
        run: |
          echo "solc path: $(which solc)"
          echo "solc version: $(solc --version 2>&1 | grep -i version)"
          for yul in compiler/yul/*.yul; do
            hex=$(solc --strict-assembly --bin "$yul" 2>/dev/null | grep -E '^[0-9a-fA-F]+$' | tail -n 1)
            if [ -z "$hex" ]; then
              echo "FAIL: solc produced no hex for $yul"
              echo "--- solc stderr ---"
              solc --strict-assembly --bin "$yul" 2>&1 || true
              echo "---"
              exit 1
            fi
            echo "OK: $yul (${#hex} hex chars)"
          done

      - name: Check static-vs-foundry gas calibration
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul"
        run: >-
          python3 scripts/check_gas.py calibration --static-report gas-report-static.tsv
          --allow-missing-contract ERC20
          --allow-missing-contract ERC721
          --allow-missing-contract Vault

  foundry:
    runs-on: [self-hosted, linux, x64, verity, build]
    timeout-minutes: 30
    needs: [changes, build-compiler-binaries]
    if: needs.changes.outputs.compiler == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard_index: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download compiler binaries
        uses: actions/download-artifact@v7
        with:
          name: verity-compiler-binaries
          path: compiler/bin

      - name: Restore compiler executable bits
        run: chmod +x compiler/bin/verity-compiler compiler/bin/verity-compiler-patched compiler/bin/difftest-interpreter

      - name: Restore smoke Yul (local)
        id: local-restore-yul-smoke
        continue-on-error: true
        run: |
          source_dir="${VERIFY_LOCAL_ARTIFACT_ROOT}/${{ github.run_id }}/generated-yul-smoke"
          if [ -f "$source_dir/.ready" ]; then
            mkdir -p compiler/yul-smoke
            cp -a "$source_dir/." compiler/yul-smoke/
            rm -f compiler/yul-smoke/.ready
            shopt -s nullglob
            restored_yul=(compiler/yul-smoke/*.yul)
            if [ "${#restored_yul[@]}" -eq 0 ]; then
              echo "::warning::Local smoke Yul cache had .ready but no .yul files — falling back"
              exit 1
            fi
            echo "Restored ${#restored_yul[@]} smoke Yul files from local cache"
          else
            exit 1
          fi

      - name: Download smoke Yul (fallback)
        if: steps.local-restore-yul-smoke.outcome != 'success'
        uses: actions/download-artifact@v7
        with:
          name: generated-yul-smoke
          path: compiler/yul-smoke

      - name: Validate smoke Yul artifacts
        run: |
          shopt -s nullglob
          out_dir="compiler/yul-smoke"
          direct_yul=("${out_dir}"/*.yul)
          if [ "${#direct_yul[@]}" -eq 0 ]; then
            mapfile -t nested_yul < <(find "${out_dir}" -mindepth 2 -maxdepth 3 -type f -name '*.yul' | sort)
            if [ "${#nested_yul[@]}" -gt 0 ]; then
              for path in "${nested_yul[@]}"; do
                mv "$path" "${out_dir}/$(basename "$path")"
              done
            fi
          fi
          direct_yul=("${out_dir}"/*.yul)
          if [ "${#direct_yul[@]}" -eq 0 ]; then
            echo "::error::No smoke Yul files restored into ${out_dir}"
            find "${out_dir}" -maxdepth 4 -print || true
            exit 1
          fi

      - name: Verify Lake package integrity
        run: |
          shopt -s nullglob
          for pkg_git in .lake/packages/*/.git; do
            pkg="$(dirname "$pkg_git")"
            if ! git -C "$pkg" rev-parse HEAD >/dev/null 2>&1; then
              echo "::warning::Removing corrupted Lake package: $pkg"
              rm -rf "$pkg"
            fi
          done

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry
        with:
          local-artifact-run-id: ${{ github.run_id }}

      - name: Run Foundry tests with seed 42
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul"
          DIFFTEST_RANDOM_SMALL: "100"
          DIFFTEST_RANDOM_LARGE: "10000"
          DIFFTEST_RANDOM_SEED: "42"
          DIFFTEST_SHARD_COUNT: "4"
          DIFFTEST_SHARD_INDEX: "${{ matrix.shard_index }}"
        run: |
          echo "Running tests with seed 42 (shard ${{ matrix.shard_index }}/4)"
          forge test

