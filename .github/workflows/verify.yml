name: Verify proofs

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/verify.yml'
      - 'Verity/**'
      - 'Verity.lean'
      - 'Compiler/**'
      - 'Compiler.lean'
      - 'examples/**'
      - 'test/**'
      - 'scripts/**'
      - 'docs/**'
      - 'docs-site/**'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - 'foundry.toml'
      - 'AXIOMS.md'
      - 'README.md'
      - 'TRUST_ASSUMPTIONS.md'
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/verify.yml'
      - 'Verity/**'
      - 'Verity.lean'
      - 'Compiler/**'
      - 'Compiler.lean'
      - 'examples/**'
      - 'test/**'
      - 'scripts/**'
      - 'docs/**'
      - 'docs-site/**'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - 'foundry.toml'
      - 'AXIOMS.md'
      - 'README.md'
      - 'TRUST_ASSUMPTIONS.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLC_VERSION: "0.8.33"
  SOLC_URL: "https://binaries.soliditylang.org/linux-amd64/solc-linux-amd64-v0.8.33+commit.64118f21"
  SOLC_SHA256: "1274e5c4621ae478090c5a1f48466fd3c5f658ed9e14b15a0b213dc806215468"

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    outputs:
      code: ${{ steps.filter.outputs.code }}
      compiler: ${{ steps.filter.outputs.compiler }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '.github/actions/**'
              - '.github/workflows/verify.yml'
              - 'Verity/**'
              - 'Verity.lean'
              - 'Compiler/**'
              - 'Compiler.lean'
              - 'examples/**'
              - 'test/**'
              - 'scripts/**'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'foundry.toml'
            compiler:
              - '.github/actions/**'
              - '.github/workflows/verify.yml'
              - 'Verity/**'
              - 'Compiler/**'
              - 'Compiler.lean'
              - 'examples/**'
              - 'test/**'
              - 'scripts/**'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'foundry.toml'

  # Python-only checks (fast, ~5s, always run)
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check property manifest references
        run: python3 scripts/check_property_manifest.py

      - name: Check property coverage
        run: python3 scripts/check_property_coverage.py

      - name: Check contract file structure
        run: python3 scripts/check_contract_structure.py

      - name: Check case-insensitive path conflicts
        run: python3 scripts/check_case_insensitive_path_conflicts.py

      - name: Check axiom locations in AXIOMS.md
        run: python3 scripts/check_axiom_locations.py

      - name: Check verification status artifact freshness
        run: python3 scripts/generate_verification_status.py --check

      - name: Check documentation counts
        run: python3 scripts/check_doc_counts.py

      - name: Check Solidity interop matrix sync
        run: python3 scripts/check_interop_matrix_sync.py

      - name: Check verify workflow sync invariants
        run: python3 scripts/check_verify_sync.py

      - name: Check GitHub issue template forms
        run: python3 scripts/check_issue_template_forms.py

      - name: Check solc pin consistency
        run: python3 scripts/check_solc_pin.py

      - name: Check property manifest sync
        run: python3 scripts/check_property_manifest_sync.py

      - name: Check issue template contamination
        run: python3 scripts/check_issue_templates.py

      - name: Check macro property-test artifact generation
        run: python3 scripts/check_macro_property_test_generation.py --check

      - name: Check macro invariant suite coverage
        run: python3 scripts/check_macro_translate_invariant_coverage.py

      - name: Check macro round-trip fuzz suite coverage
        run: python3 scripts/check_macro_roundtrip_fuzz_coverage.py

      - name: Check storage layout consistency
        run: python3 scripts/check_storage_layout.py

      - name: Check manual-spec quarantine boundary
        run: python3 scripts/check_manual_spec_quarantine.py

      - name: Check SpecCorrectness migration boundary
        run: python3 scripts/check_spec_proof_migration_boundary.py

      - name: Check migrated legacy-example import boundary
        run: python3 scripts/check_legacy_example_imports.py

      - name: Check Layer-2 sender/storage universality
        run: python3 scripts/check_layer2_universality.py

      - name: Check Lean hygiene
        run: python3 scripts/check_lean_hygiene.py

      - name: Check static gas model builtin coverage
        run: python3 scripts/check_gas_model_coverage.py

      - name: Check mapping slot abstraction boundary
        run: python3 scripts/check_mapping_slot_boundary.py

      - name: Check Yul builtin abstraction boundary
        run: python3 scripts/check_yul_builtin_boundary.py

      - name: Check active rewrite-rule proof metadata
        run: python3 scripts/check_rewrite_proof_metadata.py

      - name: Check builtin list sync (Linker ↔ CompilationModel)
        run: python3 scripts/check_builtin_list_sync.py

      - name: Check EVMYulLean capability boundary
        run: python3 scripts/check_evmyullean_capability_boundary.py

      - name: Check EVMYulLean capability + unsupported-node report freshness
        run: python3 scripts/generate_evmyullean_capability_report.py --check

      - name: Check EVMYulLean adapter report freshness
        run: python3 scripts/generate_evmyullean_adapter_report.py --check

      - name: Check PrintAxioms.lean freshness
        run: python3 scripts/generate_print_axioms.py --check

      - name: Check proof length limits
        run: python3 scripts/check_proof_length.py

      - name: Check issue #1060 integrity ledger
        run: python3 scripts/check_issue_1060_integrity.py

      - name: Run Python unit tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py' -v

  # Fast external pre-check with AXLE verify_proof API.
  # This is advisory acceleration, not a replacement for local trusted Lean checks.
  axle-verify-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.code == 'true' && secrets.AXLE_API_KEY != ''
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: lean-filter
        with:
          list-files: csv
          filters: |
            lean:
              - 'Verity/**.lean'
              - 'Verity/**/*.lean'
              - 'Verity.lean'
              - 'Compiler/**.lean'
              - 'Compiler/**/*.lean'
              - 'Compiler.lean'

      - name: Run AXLE verify_proof pre-check
        if: steps.lean-filter.outputs.lean == 'true'
        env:
          AXLE_API_KEY: ${{ secrets.AXLE_API_KEY }}
        run: |
          python3 scripts/axle_verify_proof_ci.py \
            --files-csv "${{ steps.lean-filter.outputs.lean_files }}"

      - name: No Lean file changes
        if: steps.lean-filter.outputs.lean != 'true'
        run: echo "No changed Lean files; AXLE verify_proof pre-check skipped."

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [changes, axle-verify-proof]
    if: needs.changes.outputs.code == 'true' && (needs.axle-verify-proof.result == 'success' || needs.axle-verify-proof.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Cache elan + Lean toolchain
        id: cache-elan
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ hashFiles('lean-toolchain') }}

      - name: Install elan
        if: steps.cache-elan.outputs.cache-hit != 'true'
        env:
          ELAN_VERSION: "v4.1.2"
          ELAN_INIT_SHA256: "4bacca9502cb89736fe63d2685abc2947cfbf34dc87673504f1bb4c43eda9264"
        run: |
          curl -sSfL "https://raw.githubusercontent.com/leanprover/elan/${ELAN_VERSION}/elan-init.sh" -o elan-init.sh
          echo "${ELAN_INIT_SHA256}  elan-init.sh" | sha256sum -c -
          bash elan-init.sh -y --default-toolchain none
          rm elan-init.sh

      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Restore Lake packages cache
        id: cache-lake
        uses: actions/cache/restore@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('Compiler/**/*.lean', 'Verity/**/*.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-

      - name: Fetch mathlib compiled cache
        run: lake exe cache get

      - name: Build and verify all proofs
        env:
          LEAN_NUM_THREADS: 4
        run: |
          set -o pipefail
          lake build 2>&1 | tee lake-build.log

      - name: Check Lean warning non-regression
        run: python3 scripts/check_lean_warning_regression.py --log lake-build.log

      - name: Run compiler CLI regression module
        env:
          LEAN_NUM_THREADS: 4
        run: lake build Compiler.MainTest

      - name: Run CompilationModel feature regression module
        env:
          LEAN_NUM_THREADS: 4
        run: lake build Compiler.CompilationModelFeatureTest

      - name: Run macro round-trip fuzz harness
        env:
          LEAN_NUM_THREADS: 4
        run: lake exe macro-roundtrip-fuzz

      - name: Check for sorry
        run: |
          # Count sorry across all Lean files (matching both 'sorry' and '· sorry').
          # Baseline is zero: any sorry is a failure.
          EXPECTED_SORRY=0
          ACTUAL_SORRY=$(grep -rn "sorry" Verity/ Compiler/ --include="*.lean" \
            | grep -v ":[[:space:]]*--" | grep -v "zero sorry" | grep -v "Summary" \
            | grep -v "SORRY" | grep -v "sorry_count" | grep -v "sorry placeholder" \
            | grep -v "No sorry" | grep -v "all proofs are complete" \
            | wc -l)
          echo "Found $ACTUAL_SORRY sorry statement(s) (expected $EXPECTED_SORRY)"
          if [ "$ACTUAL_SORRY" -ne "$EXPECTED_SORRY" ]; then
            echo "ERROR: Unexpected sorry count ($ACTUAL_SORRY found, $EXPECTED_SORRY expected)"
            grep -rn "sorry" Verity/ Compiler/ --include="*.lean" \
              | grep -v ":[[:space:]]*--" | grep -v "zero sorry" | grep -v "Summary" \
              | grep -v "SORRY" | grep -v "sorry_count" | grep -v "sorry placeholder" \
              | grep -v "No sorry" | grep -v "all proofs are complete"
            exit 1
          fi
          echo "✓ Sorry count ($ACTUAL_SORRY) within expected limit ($EXPECTED_SORRY)"

      - name: Check for axioms in proof files
        run: |
          echo "Checking for axioms in Compiler/ and Verity/..."

          # Find all axioms across both directories (including private/protected axioms).
          grep -rnE "^(private |protected )?axiom " Compiler/ Verity/ --include="*.lean" | tee axioms.txt || true

          # Count axioms
          AXIOM_COUNT=$(wc -l < axioms.txt 2>/dev/null | tr -d ' ')

          echo "Found $AXIOM_COUNT axiom declaration(s)"

          if [ "$AXIOM_COUNT" -gt 0 ]; then
            echo "::warning::Found $AXIOM_COUNT axiom(s) in proof files"
            cat axioms.txt

            # Check if AXIOMS.md exists
            if [ ! -f "AXIOMS.md" ]; then
              echo "::error::AXIOMS.md not found. All axioms must be documented."
              exit 1
            fi

            # Verify each axiom is documented in AXIOMS.md
            echo "Verifying all axioms are documented..."

            # Extract axiom names from grep output
            AXIOM_NAMES=$(sed -E 's/.*:(private |protected )?axiom ([a-zA-Z0-9_]*).*/\2/' axioms.txt | sort -u)

            UNDOCUMENTED=""
            for axiom_name in $AXIOM_NAMES; do
              if ! grep -q "$axiom_name" AXIOMS.md; then
                echo "::error::Axiom '$axiom_name' not documented in AXIOMS.md"
                UNDOCUMENTED="$UNDOCUMENTED $axiom_name"
              else
                echo "✓ Axiom '$axiom_name' is documented"
              fi
            done

            if [ -n "$UNDOCUMENTED" ]; then
              echo "::error::Undocumented axioms:$UNDOCUMENTED"
              exit 1
            fi

            echo "✓ All $AXIOM_COUNT axioms are documented in AXIOMS.md"
          else
            echo "✓ No axioms found in proof files"
          fi

      - name: Build proof modules for axiom audit
        env:
          LEAN_NUM_THREADS: 4
        run: lake build PrintAxioms

      - name: Generate axiom dependency report
        run: |
          set -o pipefail
          lake env lean PrintAxioms.lean 2>&1 | tee axiom-report-raw.log
          AXIOM_REPORT_FILE=axiom-report.md python3 scripts/check_axiom_report.py --log axiom-report-raw.log | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Generate proof length report
        run: python3 scripts/check_proof_length.py --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Generate property coverage report
        run: python3 scripts/report_property_coverage.py --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Generate storage layout report
        run: python3 scripts/check_storage_layout.py --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Save Lake packages cache
        if: success() && steps.cache-lake.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('Compiler/**/*.lean', 'Verity/**/*.lean') }}

      - name: Upload axiom dependency report
        uses: actions/upload-artifact@v4
        with:
          name: axiom-dependency-report
          path: |
            axiom-report.md
            axiom-report-raw.log

  # Compiler executable + Yul generation + solc validation.
  # Cached separately from proofs: only rebuilds when Compiler/ sources,
  # lean-toolchain, or lake-manifest.json change.  Proof-only changes
  # (Verity/**) never invalidate this cache.
  build-compiler:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    needs: [changes, axle-verify-proof]
    if: needs.changes.outputs.compiler == 'true' && (needs.axle-verify-proof.result == 'success' || needs.axle-verify-proof.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Cache elan + Lean toolchain
        id: cache-elan
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ hashFiles('lean-toolchain') }}

      - name: Install elan
        if: steps.cache-elan.outputs.cache-hit != 'true'
        env:
          ELAN_VERSION: "v4.1.2"
          ELAN_INIT_SHA256: "4bacca9502cb89736fe63d2685abc2947cfbf34dc87673504f1bb4c43eda9264"
        run: |
          curl -sSfL "https://raw.githubusercontent.com/leanprover/elan/${ELAN_VERSION}/elan-init.sh" -o elan-init.sh
          echo "${ELAN_INIT_SHA256}  elan-init.sh" | sha256sum -c -
          bash elan-init.sh -y --default-toolchain none
          rm elan-init.sh

      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Restore Lake compiler cache
        id: cache-lake-compiler
        uses: actions/cache/restore@v4
        with:
          path: .lake
          key: lake-compiler-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('Compiler/**/*.lean') }}
          restore-keys: |
            lake-compiler-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-

      - name: Clear stale Lake cache on partial hit
        if: steps.cache-lake-compiler.outputs.cache-hit != 'true'
        run: rm -rf .lake

      - name: Fetch mathlib compiled cache
        run: lake exe cache get

      - name: Build compiler
        env:
          LEAN_NUM_THREADS: 4
        run: lake build verity-compiler

      - name: Build difftest interpreter
        env:
          LEAN_NUM_THREADS: 4
        run: lake build difftest-interpreter

      - name: Generate Yul (all contracts + CryptoHash with linked libraries)
        run: |
          ./.lake/build/bin/verity-compiler \
            --output compiler/yul \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Generate patched Yul + patch coverage report
        run: |
          ./.lake/build/bin/verity-compiler \
            --enable-patches \
            --patch-report compiler/patch-report.tsv \
            --output compiler/yul-patched \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Generate parity-pack Yul (pinned solc tuple)
        run: |
          ./.lake/build/bin/verity-compiler \
            --parity-pack solc-0.8.33-o200-viair-false-evm-shanghai \
            --output compiler/yul-parity-pack \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Generate parity-pack reference Yul (explicit profile + patch config)
        run: |
          ./.lake/build/bin/verity-compiler \
            --backend-profile solidity-parity \
            --enable-patches \
            --patch-max-iterations 6 \
            --mapping-slot-scratch-base 512 \
            --output compiler/yul-parity-reference \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Generate parity-pack identity diff report
        run: |
          python3 scripts/generate_yul_identity_diff_report.py \
            --verity-dir compiler/yul-parity-pack \
            --solc-dir compiler/yul-parity-reference \
            --output compiler/parity-pack-identity-report.json

      - name: Gate parity-pack metrics
        run: |
          python3 scripts/check_parity_pack_metrics.py \
            --report compiler/parity-pack-identity-report.json \
            --max-only-in-verity 0 \
            --max-only-in-solidity 0 \
            --max-hash-mismatch 0 \
            --format markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Check static gas model coverage on generated Yul (baseline + patched)
        run: |
          python3 scripts/check_gas_model_coverage.py \
            --dir compiler/yul \
            --dir compiler/yul-patched

      - name: Keccak-256 self-test (validate hash implementation)
        run: python3 scripts/keccak256.py --self-test

      - name: Check selector hashing against specs
        run: python3 scripts/check_selectors.py

      - name: Setup solc
        uses: ./.github/actions/setup-solc

      - name: Compile generated Yul with solc
        run: |
          python3 scripts/check_yul_compiles.py \
            --dir compiler/yul \
            --dir compiler/yul-patched \
            --require-same-files compiler/yul compiler/yul-patched

      - name: Check selector fixtures against solc
        run: python3 scripts/check_selector_fixtures.py

      - name: Check static gas report invariants
        run: python3 scripts/check_gas_report.py

      - name: Save static gas report snapshot
        run: lake exe gas-report > gas-report-static.tsv

      - name: Save patched static gas report snapshot
        run: lake exe gas-report --enable-patches --patch-max-iterations 2 > gas-report-static-patched.tsv

      - name: Check static gas patch delta non-regression
        run: |
          python3 scripts/check_patch_gas_delta.py \
            --baseline-report gas-report-static.tsv \
            --patched-report gas-report-static-patched.tsv \
            --min-improved-contracts 0 \
            --summary-markdown patch-gas-delta-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize patch coverage report
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import csv
          from collections import defaultdict
          path = "compiler/patch-report.tsv"
          rows = list(csv.DictReader(open(path), delimiter="\t"))
          totals = defaultdict(int)
          contracts = defaultdict(int)
          for row in rows:
            patch = row["patch_name"]
            if patch == "-":
              continue
            match_count = int(row["match_count"])
            totals[patch] += match_count
            contracts[patch] += 1
          print("### Patch Coverage")
          if not totals:
            print("No patch rules fired in this run.")
          else:
            print("| Patch | Total Matches | Contracts |")
            print("| :-- | --: | --: |")
            for patch, total in sorted(totals.items(), key=lambda kv: kv[1], reverse=True):
              print(f"| `{patch}` | {total} | {contracts[patch]} |")
          PY

      - name: Save Lake compiler cache
        if: success() && steps.cache-lake-compiler.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .lake
          key: lake-compiler-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('Compiler/**/*.lean') }}

      - name: Upload generated Yul
        uses: actions/upload-artifact@v4
        with:
          name: generated-yul
          path: compiler/yul

      - name: Upload patched Yul
        uses: actions/upload-artifact@v4
        with:
          name: generated-yul-patched
          path: compiler/yul-patched

      - name: Upload difftest interpreter
        uses: actions/upload-artifact@v4
        with:
          name: difftest-interpreter
          path: .lake/build/bin/difftest-interpreter

      - name: Upload static gas report
        uses: actions/upload-artifact@v4
        with:
          name: static-gas-report
          path: gas-report-static.tsv

      - name: Upload patched static gas report
        uses: actions/upload-artifact@v4
        with:
          name: static-gas-report-patched
          path: gas-report-static-patched.tsv

      - name: Upload patch coverage report
        uses: actions/upload-artifact@v4
        with:
          name: patch-coverage-report
          path: compiler/patch-report.tsv

      - name: Upload parity-pack identity report
        uses: actions/upload-artifact@v4
        with:
          name: parity-pack-identity-report
          path: compiler/parity-pack-identity-report.json

  # Optional Lean typechecking profiler (workflow_dispatch only).
  lean-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    if: github.event_name == 'workflow_dispatch' && needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Cache elan + Lean toolchain
        id: cache-elan
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ hashFiles('lean-toolchain') }}

      - name: Install elan
        if: steps.cache-elan.outputs.cache-hit != 'true'
        env:
          ELAN_VERSION: "v4.1.2"
          ELAN_INIT_SHA256: "4bacca9502cb89736fe63d2685abc2947cfbf34dc87673504f1bb4c43eda9264"
        run: |
          curl -sSfL "https://raw.githubusercontent.com/leanprover/elan/${ELAN_VERSION}/elan-init.sh" -o elan-init.sh
          echo "${ELAN_INIT_SHA256}  elan-init.sh" | sha256sum -c -
          bash elan-init.sh -y --default-toolchain none
          rm elan-init.sh

      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Restore Lake cache
        id: cache-lake
        uses: actions/cache/restore@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-

      - name: Fetch mathlib compiled cache
        run: lake exe cache get

      - name: Profile Lean module timings
        run: python3 scripts/profile_lean_modules.py --output lean-perf-queue.md

      - name: Publish Lean profiling summary
        run: cat lean-perf-queue.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lean perf queue
        uses: actions/upload-artifact@v4
        with:
          name: lean-perf-queue
          path: lean-perf-queue.md

  foundry-gas-calibration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, build, build-compiler]
    if: needs.changes.outputs.compiler == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download static gas report
        uses: actions/download-artifact@v4
        with:
          name: static-gas-report

      - name: Download generated Yul
        uses: actions/download-artifact@v4
        with:
          name: generated-yul
          path: compiler/yul

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry

      - name: Check static-vs-foundry gas calibration
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul"
        run: python3 scripts/check_gas_calibration.py --static-report gas-report-static.tsv

  foundry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, build, build-compiler]
    if: needs.changes.outputs.compiler == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download generated Yul
        uses: actions/download-artifact@v4
        with:
          name: generated-yul
          path: compiler/yul

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry

      - name: Run Foundry tests with seed 42
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul"
          DIFFTEST_RANDOM_SMALL: "100"
          DIFFTEST_RANDOM_LARGE: "10000"
          DIFFTEST_RANDOM_SEED: "42"
          DIFFTEST_SHARD_COUNT: "8"
          DIFFTEST_SHARD_INDEX: "${{ matrix.shard_index }}"
        run: |
          echo "Running tests with seed 42 (shard ${{ matrix.shard_index }}/8)"
          forge test

  # Smoke gate for patch-enabled Yul on differential/property harness.
  foundry-patched:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, build, build-compiler]
    if: needs.changes.outputs.compiler == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download patched Yul
        uses: actions/download-artifact@v4
        with:
          name: generated-yul-patched
          path: compiler/yul-patched

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry

      - name: Run Foundry patched-Yul smoke tests
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul-patched"
          DIFFTEST_RANDOM_SMALL: "100"
          DIFFTEST_RANDOM_LARGE: "10000"
          DIFFTEST_RANDOM_SEED: "42"
          DIFFTEST_SHARD_COUNT: "1"
          DIFFTEST_SHARD_INDEX: "0"
        run: |
          echo "Running patched-Yul smoke tests with seed 42"
          # Keep runtime bounded; full 10k random sweeps are already covered by baseline shards.
          forge test --no-match-test "Random10000"

  # Multi-seed testing to detect flakiness and seed-dependent failures
  foundry-multi-seed:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes, build, build-compiler]
    if: needs.changes.outputs.compiler == 'true'
    strategy:
      fail-fast: false  # Test all seeds even if one fails
      matrix:
        seed: [0, 1, 42, 123, 999, 12345, 67890]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download generated Yul
        uses: actions/download-artifact@v4
        with:
          name: generated-yul
          path: compiler/yul

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry

      - name: Run tests with seed ${{ matrix.seed }}
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul"
          DIFFTEST_RANDOM_SMALL: "100"
          DIFFTEST_RANDOM_LARGE: "10000"
          DIFFTEST_RANDOM_SEED: "${{ matrix.seed }}"
          DIFFTEST_SHARD_COUNT: "1"  # No sharding for multi-seed tests
          DIFFTEST_SHARD_INDEX: "0"
        run: |
          echo "::group::Testing with seed ${{ matrix.seed }}"
          echo "DIFFTEST_RANDOM_SEED=${{ matrix.seed }}"
          forge test
          echo "::endgroup::"

      - name: Report seed-specific failure
        if: failure()
        run: |
          echo "::error::Tests failed with seed ${{ matrix.seed }}"
          echo "::notice::Reproduce locally: FOUNDRY_PROFILE=difftest DIFFTEST_RANDOM_SEED=${{ matrix.seed }} forge test -vv"

  failure-hints:
    runs-on: ubuntu-latest
    needs: [checks, axle-verify-proof, build, build-compiler, foundry-gas-calibration, foundry, foundry-patched, foundry-multi-seed]
    if: always() && github.event_name == 'pull_request' && contains(join(needs.*.result, ','), 'failure')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Post CI failure hints
        uses: actions/github-script@v7
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        with:
          script: |
            const marker = "<!-- issue-1060-ci-failure-hints -->";
            const needs = JSON.parse(process.env.NEEDS_JSON || "{}");
            const failed = Object.entries(needs)
              .filter(([, info]) => info && info.result === "failure")
              .map(([name]) => name);
            if (failed.length === 0) {
              core.info("No failed jobs; no hint comment needed.");
              return;
            }

            const lines = [];
            lines.push(marker);
            lines.push("### CI Failure Hints");
            lines.push("");
            lines.push("Failed jobs: " + failed.map((n) => "`" + n + "`").join(", "));
            lines.push("");
            lines.push("Copy-paste local triage:");
            lines.push("```bash");
            lines.push("make check");
            lines.push("python3 scripts/generate_verification_status.py --check");
            lines.push("python3 scripts/check_doc_counts.py");
            lines.push("lake build");
            lines.push("FOUNDRY_PROFILE=difftest forge test -vv");
            lines.push("```");
            const body = lines.join("\\n");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((c) =>
              c.user && c.user.type === "Bot" && typeof c.body === "string" && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
