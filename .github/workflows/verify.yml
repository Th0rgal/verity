name: Verify proofs

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/**'
      - '.github/workflows/verify.yml'
      - 'artifacts/**'
      - 'Verity/**'
      - 'Verity.lean'
      - 'Compiler/**'
      - 'Compiler.lean'
      - 'Contracts/**'
      - 'Contracts.lean'
      - 'examples/**'
      - 'packages/**'
      - 'test/**'
      - 'scripts/**'
      - 'docs/**'
      - 'docs-site/**'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - 'foundry.toml'
      - 'Makefile'
      - 'AUDIT.md'
      - 'AXIOMS.md'
      - 'README.md'
      - 'TRUST_ASSUMPTIONS.md'
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/**'
      - '.github/workflows/verify.yml'
      - 'artifacts/**'
      - 'Verity/**'
      - 'Verity.lean'
      - 'Compiler/**'
      - 'Compiler.lean'
      - 'Contracts/**'
      - 'Contracts.lean'
      - 'examples/**'
      - 'packages/**'
      - 'test/**'
      - 'scripts/**'
      - 'docs/**'
      - 'docs-site/**'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - 'foundry.toml'
      - 'Makefile'
      - 'AUDIT.md'
      - 'AXIOMS.md'
      - 'README.md'
      - 'TRUST_ASSUMPTIONS.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLC_VERSION: "0.8.33"
  SOLC_URL: "https://binaries.soliditylang.org/linux-amd64/solc-linux-amd64-v0.8.33+commit.64118f21"
  SOLC_SHA256: "1274e5c4621ae478090c5a1f48466fd3c5f658ed9e14b15a0b213dc806215468"

jobs:
  changes:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      build: ${{ steps.filter.outputs.build }}
      compiler: ${{ steps.filter.outputs.compiler }}
      macro_fuzz: ${{ steps.filter.outputs.macro_fuzz }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '.github/actions/**'
              - '.github/workflows/verify.yml'
              - 'Verity/**'
              - 'Verity.lean'
              - 'Compiler/**'
              - 'Compiler.lean'
              - 'Contracts/**'
              - 'Contracts.lean'
              - 'examples/**'
              - 'packages/**'
              - 'test/**'
              - 'scripts/**'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'foundry.toml'
            build:
              - '.github/actions/**'
              - '.github/workflows/verify.yml'
              - 'Verity/**'
              - 'Verity.lean'
              - 'Compiler/**'
              - 'Compiler.lean'
              - 'Contracts/**'
              - 'Contracts.lean'
              - 'examples/**'
              - 'packages/**'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
            compiler:
              - '.github/actions/**'
              - '.github/workflows/verify.yml'
              - 'Verity/**'
              - '!Verity/Proofs/**'
              - 'Compiler/**'
              - '!Compiler/Proofs/**'
              - 'Compiler.lean'
              - 'Contracts/**'
              - '!Contracts/**/Proofs/**'
              - 'Contracts.lean'
              - 'examples/**'
              - 'packages/**'
              - 'test/**'
              - 'scripts/check_gas.py'
              - 'scripts/check_patch_gas_delta.py'
              - 'scripts/check_parity_pack_metrics.py'
              - 'scripts/check_selectors.py'
              - 'scripts/check_yul.py'
              - 'scripts/generate_yul_identity_diff_report.py'
              - 'scripts/keccak256.py'
              - 'scripts/property_utils.py'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'foundry.toml'
            macro_fuzz:
              - '.github/actions/setup-lean/action.yml'
              - '.github/workflows/verify.yml'
              - 'Verity/Macro/**'
              - 'Compiler/**'
              - '!Compiler/Proofs/**'
              - 'Compiler.lean'
              - 'Contracts/**'
              - '!Contracts/**/Proofs/**'
              - 'Contracts.lean'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'

  checks:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run all checks
        run: make check

  build:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 25
    needs: [changes, checks]
    if: needs.checks.result == 'success' && needs.changes.outputs.build == 'true'
    env:
      LEAN_NUM_THREADS: 8
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Lean
        id: setup-lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake

      - name: Build and verify all proofs
        run: |
          set -o pipefail
          lake build 2>&1 | tee lake-build.log

      - name: Check Lean warning non-regression
        run: python3 scripts/check_lean_warning_regression.py --log lake-build.log

      - name: Save Lake packages cache
        if: success() && needs.changes.outputs.build == 'true' && steps.setup-lean.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}

  build-audits:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    needs: [changes, checks, build]
    if: needs.checks.result == 'success' && needs.build.result == 'success' && needs.changes.outputs.build == 'true'
    env:
      LEAN_NUM_THREADS: 4
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake

      - name: Build split Lake packages independently
        run: python3 scripts/check_split_package_builds.py

      - name: Check macro round-trip fuzz coverage
        run: python3 scripts/check_macro_roundtrip_fuzz_coverage.py

      - name: Check for axioms in proof files
        run: |
          echo "Checking for axioms in Compiler/ and Verity/..."
          grep -rnE "^(private |protected )?axiom " Compiler/ Verity/ --include="*.lean" | tee axioms.txt || true
          AXIOM_COUNT=$(wc -l < axioms.txt 2>/dev/null | tr -d ' ')
          echo "Found $AXIOM_COUNT axiom declaration(s)"
          if [ "$AXIOM_COUNT" -gt 0 ]; then
            echo "::warning::Found $AXIOM_COUNT axiom(s) in proof files"
            if [ ! -f "AXIOMS.md" ]; then
              echo "::error::AXIOMS.md not found. All axioms must be documented."
              exit 1
            fi
            AXIOM_NAMES=$(sed -E 's/.*:(private |protected )?axiom ([a-zA-Z0-9_]*).*/\2/' axioms.txt | sort -u)
            UNDOCUMENTED=""
            for axiom_name in $AXIOM_NAMES; do
              if ! grep -q "$axiom_name" AXIOMS.md; then
                echo "::error::Axiom '$axiom_name' not documented in AXIOMS.md"
                UNDOCUMENTED="$UNDOCUMENTED $axiom_name"
              else
                echo "✓ Axiom '$axiom_name' is documented"
              fi
            done
            if [ -n "$UNDOCUMENTED" ]; then
              echo "::error::Undocumented axioms:$UNDOCUMENTED"
              exit 1
            fi
            echo "✓ All $AXIOM_COUNT axioms are documented in AXIOMS.md"
          else
            echo "✓ No axioms found in proof files"
          fi

      - name: Build proof modules for axiom audit
        run: lake build PrintAxioms

      - name: Generate axiom dependency report
        run: |
          set -o pipefail
          lake env lean PrintAxioms.lean 2>&1 | tee axiom-report-raw.log
          AXIOM_REPORT_FILE=axiom-report.md python3 scripts/check_axioms.py --log axiom-report-raw.log | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Generate proof length report
        run: python3 scripts/check_proof_length.py --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Generate property coverage report
        run: python3 scripts/report_property_coverage.py --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Generate storage layout report
        run: python3 scripts/check_storage_layout.py --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload axiom dependency report
        uses: actions/upload-artifact@v4
        with:
          name: axiom-dependency-report
          path: |
            axiom-report.md
            axiom-report-raw.log

  macro-fuzz:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 90
    needs: [changes, checks, build]
    if: needs.checks.result == 'success' && needs.build.result == 'success' && needs.changes.outputs.macro_fuzz == 'true'
    env:
      LEAN_NUM_THREADS: 8
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Lean
        id: setup-lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake

      - name: Run macro round-trip fuzz harness
        run: lake exe macro-roundtrip-fuzz

  build-compiler:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 120
    needs: [changes, checks, build]
    if: needs.checks.result == 'success' && needs.build.result == 'success' && needs.changes.outputs.compiler == 'true'
    env:
      LEAN_NUM_THREADS: 12
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Lean
        id: setup-lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake-compiler

      - name: Build compiler artifacts
        run: |
          set -- $(grep -vE '^[[:space:]]*($|#)' packages/verity-examples/contracts.manifest)
          stdbuf -oL -eL lake build \
            "$@" \
            verity-compiler \
            verity-compiler-patched \
            difftest-interpreter

      - name: Generate Yul (all contracts + CryptoHash with linked libraries)
        run: |
          ./.lake/build/bin/verity-compiler \
            --manifest packages/verity-examples/contracts.manifest \
            --output compiler/yul \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Generate patched Yul + patch coverage report
        run: |
          ./.lake/build/bin/verity-compiler-patched \
            --manifest packages/verity-examples/contracts.manifest \
            --enable-patches \
            --patch-report compiler/patch-report.tsv \
            --output compiler/yul-patched \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Save static gas report snapshot
        run: lake exe gas-report --manifest packages/verity-examples/contracts.manifest > gas-report-static.tsv

      - name: Save patched static gas report snapshot
        run: lake exe gas-report --manifest packages/verity-examples/contracts.manifest --enable-patches --patch-max-iterations 2 > gas-report-static-patched.tsv

      - name: Package compiler binaries
        run: |
          mkdir -p compiler/bin
          cp ./.lake/build/bin/verity-compiler compiler/bin/
          cp ./.lake/build/bin/verity-compiler-patched compiler/bin/
          cp ./.lake/build/bin/difftest-interpreter compiler/bin/

      - name: Save Lake compiler cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .lake
          key: lake-compiler-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.run_id }}

      - name: Upload generated Yul
        uses: actions/upload-artifact@v4
        with:
          name: generated-yul
          path: compiler/yul

      - name: Upload patched Yul
        uses: actions/upload-artifact@v4
        with:
          name: generated-yul-patched
          path: compiler/yul-patched

      - name: Upload difftest interpreter
        uses: actions/upload-artifact@v4
        with:
          name: difftest-interpreter
          path: .lake/build/bin/difftest-interpreter

      - name: Upload compiler binaries
        uses: actions/upload-artifact@v4
        with:
          name: verity-compiler-binaries
          path: compiler/bin

      - name: Upload static gas report
        uses: actions/upload-artifact@v4
        with:
          name: static-gas-report
          path: gas-report-static.tsv

      - name: Upload patched static gas report
        uses: actions/upload-artifact@v4
        with:
          name: static-gas-report-patched
          path: gas-report-static-patched.tsv

      - name: Upload patch coverage report
        uses: actions/upload-artifact@v4
        with:
          name: patch-coverage-report
          path: compiler/patch-report.tsv

  compiler-audits:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 45
    needs: [changes, checks, build, build-compiler]
    if: needs.checks.result == 'success' && needs.build.result == 'success' && needs.build-compiler.result == 'success' && needs.changes.outputs.compiler == 'true'
    env:
      LEAN_NUM_THREADS: 8
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake-compiler

      - name: Download generated Yul
        uses: actions/download-artifact@v4
        with:
          name: generated-yul
          path: compiler/yul

      - name: Download patched Yul
        uses: actions/download-artifact@v4
        with:
          name: generated-yul-patched
          path: compiler/yul-patched

      - name: Download static gas report
        uses: actions/download-artifact@v4
        with:
          name: static-gas-report

      - name: Download patched static gas report
        uses: actions/download-artifact@v4
        with:
          name: static-gas-report-patched

      - name: Download patch coverage report
        uses: actions/download-artifact@v4
        with:
          name: patch-coverage-report
          path: compiler

      - name: Download compiler binaries
        uses: actions/download-artifact@v4
        with:
          name: verity-compiler-binaries
          path: compiler/bin

      - name: Setup solc
        uses: ./.github/actions/setup-solc

      - name: Generate parity-pack Yul (pinned solc tuple)
        if: github.event_name != 'pull_request'
        run: |
          ./compiler/bin/verity-compiler-patched \
            --manifest packages/verity-examples/contracts.manifest \
            --parity-pack solc-0.8.33-o200-viair-false-evm-shanghai \
            --output compiler/yul-parity-pack \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Generate parity-pack reference Yul (explicit profile + patch config)
        if: github.event_name != 'pull_request'
        run: |
          ./compiler/bin/verity-compiler-patched \
            --manifest packages/verity-examples/contracts.manifest \
            --backend-profile solidity-parity \
            --enable-patches \
            --patch-max-iterations 6 \
            --mapping-slot-scratch-base 512 \
            --output compiler/yul-parity-reference \
            --link examples/external-libs/PoseidonT3.yul \
            --link examples/external-libs/PoseidonT4.yul

      - name: Generate parity-pack identity diff report
        if: github.event_name != 'pull_request'
        run: |
          python3 scripts/generate_yul_identity_diff_report.py \
            --verity-dir compiler/yul-parity-pack \
            --solc-dir compiler/yul-parity-reference \
            --output compiler/parity-pack-identity-report.json

      - name: Gate parity-pack metrics
        if: github.event_name != 'pull_request'
        run: |
          python3 scripts/check_parity_pack_metrics.py \
            --report compiler/parity-pack-identity-report.json \
            --max-only-in-verity 0 \
            --max-only-in-solidity 0 \
            --max-hash-mismatch 0 \
            --format markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Check static gas model coverage on generated Yul (baseline + patched)
        run: |
          python3 scripts/check_gas.py coverage \
            --dir compiler/yul \
            --dir compiler/yul-patched

      - name: Keccak-256 self-test (validate hash implementation)
        run: python3 scripts/keccak256.py --self-test

      - name: Check selector hashing against specs
        run: python3 scripts/check_selectors.py --check-fixtures

      - name: Check generated Yul invariants
        run: |
          python3 scripts/check_yul.py \
            --dir compiler/yul \
            --dir compiler/yul-patched \
            --require-same-files compiler/yul compiler/yul-patched

      - name: Check static gas report invariants
        run: python3 scripts/check_gas.py report

      - name: Check static gas patch delta non-regression
        run: |
          python3 scripts/check_patch_gas_delta.py \
            --baseline-report gas-report-static.tsv \
            --patched-report gas-report-static-patched.tsv \
            --min-improved-contracts 0 \
            --summary-markdown patch-gas-delta-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize patch coverage report
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import csv
          from collections import defaultdict
          path = "compiler/patch-report.tsv"
          rows = list(csv.DictReader(open(path), delimiter="\t"))
          totals = defaultdict(int)
          contracts = defaultdict(int)
          for row in rows:
            patch = row["patch_name"]
            if patch == "-":
              continue
            match_count = int(row["match_count"])
            totals[patch] += match_count
            contracts[patch] += 1
          print("### Patch Coverage")
          if not totals:
            print("No patch rules fired in this run.")
          else:
            print("| Patch | Total Matches | Contracts |")
            print("| :-- | --: | --: |")
            for patch, total in sorted(totals.items(), key=lambda kv: kv[1], reverse=True):
              print(f"| `{patch}` | {total} | {contracts[patch]} |")
          PY

      - name: Upload parity-pack identity report
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: parity-pack-identity-report
          path: compiler/parity-pack-identity-report.json

  compiler-regressions:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 60
    needs: [changes, checks, build, build-compiler]
    if: needs.checks.result == 'success' && needs.build.result == 'success' && needs.build-compiler.result == 'success' && needs.changes.outputs.compiler == 'true'
    env:
      LEAN_NUM_THREADS: 12
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Lean
        uses: ./.github/actions/setup-lean
        with:
          cache-key-prefix: lake-compiler

      - name: Run compiler CLI regression module
        run: stdbuf -oL -eL lake exe compiler-main-test

      - name: Run CompilationModel feature regression module
        run: lake build Compiler.CompilationModelFeatureTest

  lean-profile:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 45
    needs: changes
    if: github.event_name == 'workflow_dispatch' && needs.changes.outputs.build == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lean
        uses: ./.github/actions/setup-lean

      - name: Profile Lean module timings
        run: python3 scripts/profile_lean_modules.py --output lean-perf-queue.md

      - name: Publish Lean profiling summary
        run: cat lean-perf-queue.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lean perf queue
        uses: actions/upload-artifact@v4
        with:
          name: lean-perf-queue
          path: lean-perf-queue.md

  foundry-gas-calibration:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    needs: [changes, build-compiler]
    if: needs.changes.outputs.compiler == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download static gas report
        uses: actions/download-artifact@v4
        with:
          name: static-gas-report

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry

      - name: Check static-vs-foundry gas calibration
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul"
        run: python3 scripts/check_gas.py calibration --static-report gas-report-static.tsv

  foundry:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    needs: [changes, build-compiler]
    if: needs.changes.outputs.compiler == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry

      - name: Run Foundry tests with seed 42
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul"
          DIFFTEST_RANDOM_SMALL: "100"
          DIFFTEST_RANDOM_LARGE: "10000"
          DIFFTEST_RANDOM_SEED: "42"
          DIFFTEST_SHARD_COUNT: "8"
          DIFFTEST_SHARD_INDEX: "${{ matrix.shard_index }}"
        run: |
          echo "Running tests with seed 42 (shard ${{ matrix.shard_index }}/8)"
          forge test

  foundry-patched:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    needs: [changes, build-compiler]
    if: needs.changes.outputs.compiler == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry
        with:
          yul-artifact-name: generated-yul-patched
          yul-artifact-path: compiler/yul-patched

      - name: Run Foundry patched-Yul smoke tests
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul-patched"
          DIFFTEST_RANDOM_SMALL: "100"
          DIFFTEST_RANDOM_LARGE: "10000"
          DIFFTEST_RANDOM_SEED: "42"
          DIFFTEST_SHARD_COUNT: "1"
          DIFFTEST_SHARD_INDEX: "0"
        run: |
          echo "Running patched-Yul smoke tests with seed 42"
          forge test --no-match-test "Random10000"

  foundry-multi-seed:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    needs: [changes, build-compiler]
    if: needs.changes.outputs.compiler == 'true' && github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        seed: [0, 1, 42, 123, 999, 12345, 67890]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Foundry environment
        uses: ./.github/actions/setup-foundry

      - name: Run tests with seed ${{ matrix.seed }}
        env:
          FOUNDRY_PROFILE: difftest
          DIFFTEST_YUL_DIR: "compiler/yul"
          DIFFTEST_RANDOM_SMALL: "100"
          DIFFTEST_RANDOM_LARGE: "10000"
          DIFFTEST_RANDOM_SEED: "${{ matrix.seed }}"
          DIFFTEST_SHARD_COUNT: "1"
          DIFFTEST_SHARD_INDEX: "0"
        run: |
          echo "::group::Testing with seed ${{ matrix.seed }}"
          echo "DIFFTEST_RANDOM_SEED=${{ matrix.seed }}"
          forge test
          echo "::endgroup::"

      - name: Report seed-specific failure
        if: failure()
        run: |
          echo "::error::Tests failed with seed ${{ matrix.seed }}"
          echo "::notice::Reproduce locally: FOUNDRY_PROFILE=difftest DIFFTEST_RANDOM_SEED=${{ matrix.seed }} forge test -vv"

  failure-hints:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [checks, build, build-audits, macro-fuzz, build-compiler, compiler-audits, compiler-regressions, foundry-gas-calibration, foundry, foundry-patched, foundry-multi-seed]
    if: always() && github.event_name == 'pull_request' && contains(join(needs.*.result, ','), 'failure')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Post CI failure hints
        uses: actions/github-script@v7
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        with:
          script: |
            const marker = "<!-- ci-failure-hints -->";
            const needs = JSON.parse(process.env.NEEDS_JSON || "{}");
            const failed = Object.entries(needs)
              .filter(([, info]) => info && info.result === "failure")
              .map(([name]) => name);
            if (failed.length === 0) {
              core.info("No failed jobs; no hint comment needed.");
              return;
            }

            const lines = [];
            lines.push(marker);
            lines.push("### CI Failure Hints");
            lines.push("");
            lines.push("Failed jobs: " + failed.map((n) => "`" + n + "`").join(", "));
            lines.push("");
            lines.push("Copy-paste local triage:");
            lines.push("```bash");
            lines.push("make check");
            lines.push("lake build");
            lines.push("FOUNDRY_PROFILE=difftest forge test -vv");
            lines.push("```");
            const body = lines.join("\\n");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((c) =>
              c.user && c.user.type === "Bot" && typeof c.body === "string" && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
