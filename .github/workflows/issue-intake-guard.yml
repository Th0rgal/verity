name: Issue Intake Guard

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

jobs:
  validate-intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate issue submission
        id: validate
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set +e
          printf '%s' "$ISSUE_BODY" > issue-body.txt
          python3 scripts/check_issue_submission.py \
            --title "$ISSUE_TITLE" \
            --body-file issue-body.txt \
            --format github > findings.md
          status=$?
          {
            echo "status=$status"
            echo "findings<<EOF"
            cat findings.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment and close invalid issue
        if: steps.validate.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const findings = `${{ steps.validate.outputs.findings }}`.trim();
            const issue_number = context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: findings,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              state: 'closed',
            });
