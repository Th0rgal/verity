name: Setup Lean
description: Install elan, restore Lake cache, and fetch mathlib compiled cache

inputs:
  cache-key-prefix:
    description: Cache key prefix for Lake packages (use different prefixes for separate caches)
    default: "lake"
  cache-primary-key:
    description: Exact Lake cache key to restore before falling back to the default prefix key
    default: ""
  cache-extra-restore-keys:
    description: Additional Lake cache restore prefixes to try before the default fallback keys
    default: ""
  use-sticky-disks:
    description: Use host-local persistent directories for stable Lean state instead of restoring GitHub caches
    default: "false"
  local-cache-root:
    description: Host-local root directory used for persistent Lean state on self-hosted runners
    default: "/srv/verity-ci-cache"
  sticky-disk-key-prefix:
    description: Prefix used when deriving persistent cache keys for elan and Lake packages
    default: ""
  lake-packages-sticky-key:
    description: Fully qualified persistent cache key to use for `.lake/packages`
    default: ""
  lake-packages-main-fallback-sticky-key:
    description: Optional persistent cache key to seed `.lake/packages` when the primary cache is cold
    default: ""
  use-build-sticky-disk:
    description: Use a persistent cache for `.lake/build` so Lake can incrementally rebuild repo targets across runs
    default: "false"
  build-sticky-disk-key:
    description: Fully qualified persistent cache key to use for `.lake/build`
    default: ""
  build-main-fallback-sticky-key:
    description: Optional persistent cache key to seed `.lake/build` when the primary cache is cold
    default: ""
  disable-lake-cache-restore:
    description: Skip restoring the GitHub Actions `.lake` cache (used by manual clean-build runs)
    default: "false"

runs:
  using: composite
  steps:
    - name: Resolve Lean persistence mode
      id: persistence
      shell: bash
      env:
        STICKY_DISKS_ENABLED: ${{ inputs.use-sticky-disks }}
        BUILD_STICKY_DISK_ENABLED: ${{ inputs.use-build-sticky-disk }}
        CACHE_KEY_PREFIX: ${{ inputs.cache-key-prefix }}
        LOCAL_CACHE_ROOT: ${{ inputs.local-cache-root }}
        STICKY_DISK_KEY_PREFIX: ${{ inputs.sticky-disk-key-prefix }}
        RUNNER_OS_NAME: ${{ runner.os }}
        LEAN_TOOLCHAIN_HASH: ${{ hashFiles('lean-toolchain') }}
        LAKEFILE_HASH: ${{ hashFiles('lakefile.lean') }}
        LAKE_MANIFEST_HASH: ${{ hashFiles('lake-manifest.json') }}
        ELAN_STICKY_KEY: elan-${{ inputs.sticky-disk-key-prefix || inputs.cache-key-prefix }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}
        OVERRIDE_LAKE_PACKAGES_STICKY_KEY: ${{ inputs.lake-packages-sticky-key }}
        LAKE_PACKAGES_MAIN_FALLBACK_STICKY_KEY: ${{ inputs.lake-packages-main-fallback-sticky-key }}
        BUILD_STICKY_DISK_KEY: ${{ inputs.build-sticky-disk-key }}
        BUILD_MAIN_FALLBACK_STICKY_KEY: ${{ inputs.build-main-fallback-sticky-key }}
      run: |
        use_sticky="${STICKY_DISKS_ENABLED}"
        use_build_sticky="${BUILD_STICKY_DISK_ENABLED}"
        key_prefix="${STICKY_DISK_KEY_PREFIX:-$CACHE_KEY_PREFIX}"
        lake_packages_sticky_key="${OVERRIDE_LAKE_PACKAGES_STICKY_KEY:-lake-packages-${key_prefix}-${RUNNER_OS_NAME}-${LEAN_TOOLCHAIN_HASH}-${LAKEFILE_HASH}-${LAKE_MANIFEST_HASH}}"
        if [ -z "${BUILD_STICKY_DISK_KEY}" ]; then
          use_build_sticky=false
        fi
        {
          echo "use_sticky_disks=${use_sticky}"
          echo "use_build_sticky_disk=${use_build_sticky}"
          echo "key_prefix=${key_prefix}"
          echo "local_cache_root=${LOCAL_CACHE_ROOT}"
          echo "elan_sticky_key=${ELAN_STICKY_KEY}"
          echo "lake_packages_sticky_key=${lake_packages_sticky_key}"
          echo "lake_packages_main_fallback_sticky_key=${LAKE_PACKAGES_MAIN_FALLBACK_STICKY_KEY}"
          echo "build_sticky_disk_key=${BUILD_STICKY_DISK_KEY}"
          echo "build_main_fallback_sticky_key=${BUILD_MAIN_FALLBACK_STICKY_KEY}"
        } >> "$GITHUB_OUTPUT"

    - name: Attach persistent elan directory
      if: steps.persistence.outputs.use_sticky_disks == 'true'
      shell: bash
      run: |
        scripts/ci_local_persistence.sh mount \
          --root "${{ steps.persistence.outputs.local_cache_root }}/elan" \
          --key "${{ steps.persistence.outputs.elan_sticky_key }}" \
          --path "$HOME/.elan"

    - name: Cache elan + Lean toolchain
      id: cache-elan
      if: steps.persistence.outputs.use_sticky_disks != 'true'
      uses: actions/cache@v5
      with:
        path: ~/.elan
        key: elan-${{ hashFiles('lean-toolchain') }}

    - name: Install elan
      if: steps.persistence.outputs.use_sticky_disks == 'true' || steps.cache-elan.outputs.cache-hit != 'true'
      shell: bash
      env:
        ELAN_VERSION: "v4.1.2"
      run: |
        if [ -x "$HOME/.elan/bin/elan" ]; then
          exit 0
        fi
        case "$(uname -s)-$(uname -m)" in
          Linux-x86_64)
            elan_target="x86_64-unknown-linux-gnu"
            ;;
          Linux-aarch64|Linux-arm64)
            elan_target="aarch64-unknown-linux-gnu"
            ;;
          Darwin-x86_64)
            elan_target="x86_64-apple-darwin"
            ;;
          Darwin-aarch64|Darwin-arm64)
            elan_target="aarch64-apple-darwin"
            ;;
          *)
            echo "::error::Unsupported platform for pinned elan install: $(uname -s)-$(uname -m)"
            exit 1
            ;;
        esac

        elan_archive="elan-${elan_target}.tar.gz"
        elan_url="https://github.com/leanprover/elan/releases/download/${ELAN_VERSION}/${elan_archive}"

        for delay in 0 5 15; do
          if [ "$delay" -gt 0 ]; then
            echo "::warning::elan install failed; retrying in ${delay}s"
            sleep "$delay"
            rm -rf "$HOME/.elan/bin" "$HOME/.elan/toolchains" "$HOME/.elan/tmp" "$HOME/.elan/update-hashes"
          fi

          tmpdir="$(mktemp -d)"
          if curl -sSfL --retry 3 --retry-delay 5 "${elan_url}" -o "${tmpdir}/${elan_archive}" \
            && tar -xzf "${tmpdir}/${elan_archive}" -C "${tmpdir}" \
            && "${tmpdir}/elan-init" -y --default-toolchain none; then
            rm -rf "${tmpdir}"
            exit 0
          fi
          rm -rf "${tmpdir}"
        done

        echo "::error::Unable to install elan ${ELAN_VERSION}"
        exit 1

    - name: Add elan to PATH
      shell: bash
      run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Resolve Lake cache keys
      id: resolve-cache-keys
      if: steps.persistence.outputs.use_sticky_disks != 'true' && inputs.disable-lake-cache-restore != 'true'
      shell: bash
      env:
        DEFAULT_CACHE_KEY: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
        DEFAULT_RESTORE_KEYS: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-
          lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-${{ hashFiles('lake-manifest.json') }}
          lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}-
        OVERRIDE_CACHE_KEY: ${{ inputs.cache-primary-key }}
        EXTRA_RESTORE_KEYS: ${{ inputs.cache-extra-restore-keys }}
      run: |
        primary_key="${OVERRIDE_CACHE_KEY:-$DEFAULT_CACHE_KEY}"
        {
          echo "primary=$primary_key"
          echo "restore_keys<<EOF"
          if [ -n "${EXTRA_RESTORE_KEYS}" ]; then
            printf '%s\n' "${EXTRA_RESTORE_KEYS}"
          fi
          printf '%s\n' "${DEFAULT_RESTORE_KEYS}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Restore Lake packages cache
      id: cache-lake
      if: steps.persistence.outputs.use_sticky_disks != 'true' && inputs.disable-lake-cache-restore != 'true'
      uses: actions/cache/restore@v5
      with:
        path: .lake
        key: ${{ steps.resolve-cache-keys.outputs.primary }}
        restore-keys: ${{ steps.resolve-cache-keys.outputs.restore_keys }}

    - name: Prepare writable Lake root for sticky disks
      if: steps.persistence.outputs.use_sticky_disks == 'true'
      shell: bash
      env:
        USE_BUILD_STICKY: ${{ steps.persistence.outputs.use_build_sticky_disk }}
      run: |
        mkdir -p .lake
        # When build sticky disk is NOT requested but a previous job left
        # .lake/build as a symlink, replace it with a real directory so
        # tar extraction and lake commands work against local state.
        if [ "$USE_BUILD_STICKY" != "true" ] && [ -L .lake/build ]; then
          rm -f .lake/build
        fi
        mkdir -p .lake/packages .lake/build
        chmod u+rwx .lake .lake/packages .lake/build

    - name: Attach persistent Lake packages directory
      if: steps.persistence.outputs.use_sticky_disks == 'true'
      shell: bash
      run: |
        scripts/ci_local_persistence.sh mount \
          --root "${{ steps.persistence.outputs.local_cache_root }}/lake-packages" \
          --key "${{ steps.persistence.outputs.lake_packages_sticky_key }}" \
          --path ".lake/packages" \
          --fallback-key "${{ steps.persistence.outputs.lake_packages_main_fallback_sticky_key }}"

    - name: Attach persistent Lake build directory
      if: steps.persistence.outputs.use_sticky_disks == 'true' && steps.persistence.outputs.use_build_sticky_disk == 'true'
      shell: bash
      run: |
        scripts/ci_local_persistence.sh mount \
          --root "${{ steps.persistence.outputs.local_cache_root }}/lake-build" \
          --key "${{ steps.persistence.outputs.build_sticky_disk_key }}" \
          --path ".lake/build" \
          --fallback-key "${{ steps.persistence.outputs.build_main_fallback_sticky_key }}"

    - name: Refresh Lake dependency state on partial cache hit
      if: steps.persistence.outputs.use_sticky_disks != 'true' && steps.cache-lake.outputs.cache-hit != 'true'
      shell: bash
      run: |
        python3 scripts/prune_lake_cache.py

    - name: Decide whether Lean dependency hydration is required
      id: hydration
      shell: bash
      env:
        USING_STICKY_DISKS: ${{ steps.persistence.outputs.use_sticky_disks }}
        LAKE_CACHE_HIT: ${{ steps.cache-lake.outputs.cache-hit }}
      run: |
        required=true
        if [ "${USING_STICKY_DISKS}" = "true" ]; then
          if [ -d ".lake/packages/mathlib/.lake/build" ]; then
            required=false
          fi
        elif [ "${LAKE_CACHE_HIT}" = "true" ]; then
          required=false
        fi
        echo "required=${required}" >> "$GITHUB_OUTPUT"

    - name: Fetch mathlib compiled cache
      id: fetch-mathlib-cache
      if: steps.hydration.outputs.required == 'true'
      shell: bash
      run: lake exe cache get
      continue-on-error: true

    - name: Retry mathlib compiled cache fetch on transient failures
      if: steps.hydration.outputs.required == 'true' && steps.fetch-mathlib-cache.outcome != 'success'
      shell: bash
      run: |
        set -u
        for delay in 5 15; do
          echo "::warning::lake exe cache get failed; retrying in ${delay}s"
          sleep "${delay}"
          if lake exe cache get; then
            exit 0
          fi
        done
        echo "::warning::Unable to download Lean compiled cache after retries; continuing with source builds."

    - name: Resolve Lake dependencies
      id: lake-resolve
      if: steps.hydration.outputs.required == 'true'
      shell: bash
      run: lake update
      continue-on-error: true

    - name: Retry Lake dependency resolution on transient failures
      if: steps.hydration.outputs.required == 'true' && steps.lake-resolve.outcome != 'success'
      shell: bash
      run: |
        set -u
        for delay in 5 15; do
          echo "::warning::lake update failed; retrying in ${delay}s"
          sleep "${delay}"
          if lake update; then
            exit 0
          fi
        done
        echo "::error::Unable to update Lake dependencies after retries"
        exit 1

outputs:
  cache-hit:
    description: Whether the Lake cache was a full hit
    value: ${{ steps.cache-lake.outputs.cache-hit }}
  using-sticky-disks:
    description: Whether host-local persistent caches were enabled for this invocation
    value: ${{ steps.persistence.outputs.use_sticky_disks }}
  using-build-sticky-disk:
    description: Whether a persistent cache directory was attached for `.lake/build`
    value: ${{ steps.persistence.outputs.use_build_sticky_disk }}
