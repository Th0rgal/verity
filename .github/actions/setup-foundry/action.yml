name: Setup Foundry test environment
description: Download build artifacts, install Foundry and solc

inputs:
  yul-artifact-name:
    description: Yul artifact name to restore before running Foundry tests
    default: "generated-yul"
  yul-artifact-path:
    description: Directory where the Yul artifact should be restored
    default: "compiler/yul"
  download-yul:
    description: Whether to restore a Yul artifact for the job
    default: "true"
  local-artifact-run-id:
    description: GitHub run ID associated with locally published CI artifacts
    default: ""

runs:
  using: composite
  steps:
    - name: Restore generated Yul (local)
      if: inputs.download-yul == 'true' && inputs.local-artifact-run-id != ''
      id: local-restore-yul
      continue-on-error: true
      shell: bash
      run: |
        set -euo pipefail

        out_dir="${{ inputs.yul-artifact-path }}"
        source_dir="${VERIFY_LOCAL_ARTIFACT_ROOT}/${{ inputs.local-artifact-run-id }}/${{ inputs.yul-artifact-name }}"
        if [ ! -f "${source_dir}/.ready" ]; then
          exit 1
        fi

        mkdir -p "${out_dir}"
        cp -a "${source_dir}/." "${out_dir}/"
        rm -f "${out_dir}/.ready"

    - name: Download generated Yul
      if: inputs.download-yul == 'true' && steps.local-restore-yul.outcome != 'success'
      uses: actions/download-artifact@v7
      with:
        name: ${{ inputs.yul-artifact-name }}
        path: ${{ inputs.yul-artifact-path }}

    - name: Normalize generated Yul artifact layout
      if: inputs.download-yul == 'true'
      shell: bash
      run: |
        set -euo pipefail

        out_dir="${{ inputs.yul-artifact-path }}"
        shopt -s nullglob
        direct_yul=("${out_dir}"/*.yul)
        if [ "${#direct_yul[@]}" -eq 0 ]; then
          mapfile -t nested_yul < <(find "${out_dir}" -mindepth 2 -maxdepth 3 -type f -name '*.yul' | sort)
          if [ "${#nested_yul[@]}" -gt 0 ]; then
            for path in "${nested_yul[@]}"; do
              mv "$path" "${out_dir}/$(basename "$path")"
            done
          fi
        fi
        direct_yul=("${out_dir}"/*.yul)
        if [ "${#direct_yul[@]}" -eq 0 ]; then
          echo "::error::No Yul files restored into ${out_dir}"
          find "${out_dir}" -maxdepth 4 -print || true
          exit 1
        fi

    - name: Restore difftest interpreter (local)
      id: local-restore-difftest
      if: inputs.local-artifact-run-id != ''
      continue-on-error: true
      shell: bash
      run: |
        set -euo pipefail

        source_dir="${VERIFY_LOCAL_ARTIFACT_ROOT}/${{ inputs.local-artifact-run-id }}/difftest-interpreter"
        if [ ! -f "${source_dir}/.ready" ]; then
          exit 1
        fi

        mkdir -p .lake/build/bin
        cp -a "${source_dir}/." .lake/build/bin/
        rm -f .lake/build/bin/.ready

    - name: Download difftest interpreter
      if: steps.local-restore-difftest.outcome != 'success'
      uses: actions/download-artifact@v7
      with:
        name: difftest-interpreter
        path: .lake/build/bin

    - name: Normalize difftest interpreter artifact layout
      shell: bash
      run: |
        set -euo pipefail

        interpreter_path=".lake/build/bin/difftest-interpreter"
        if [ ! -f "$interpreter_path" ]; then
          nested_path="$(find .lake/build/bin -mindepth 2 -maxdepth 3 -type f -name 'difftest-interpreter' | head -n 1 || true)"
          if [ -n "$nested_path" ]; then
            mv "$nested_path" "$interpreter_path"
          fi
        fi
        if [ ! -f "$interpreter_path" ]; then
          echo "::error::difftest-interpreter was not restored"
          find .lake/build/bin -maxdepth 4 -print || true
          exit 1
        fi

    - name: Make difftest interpreter executable
      shell: bash
      run: chmod +x .lake/build/bin/difftest-interpreter

    - name: Cache Foundry binaries
      id: cache-foundry
      uses: actions/cache@v5
      with:
        path: ~/.foundry/bin
        key: foundry-v1.5.0-linux-amd64

    - name: Install Foundry
      if: steps.cache-foundry.outputs.cache-hit != 'true'
      id: install_foundry_primary
      continue-on-error: true
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: v1.5.0

    - name: Install Foundry fallback (retry on transient download errors)
      if: steps.cache-foundry.outputs.cache-hit != 'true' && steps.install_foundry_primary.outcome != 'success'
      shell: bash
      run: |
        set -euo pipefail

        FOUNDRY_BIN="$HOME/.foundry/bin"
        mkdir -p "$FOUNDRY_BIN"
        RELEASE_TAG="v1.5.0"
        TARBALL_URL="https://github.com/foundry-rs/foundry/releases/download/${RELEASE_TAG}/foundry_${RELEASE_TAG}_linux_amd64.tar.gz"

        max_attempts=3
        attempt=1
        while true; do
          echo "Attempt ${attempt}: downloading Foundry ${RELEASE_TAG} from GitHub Releases..."
          tmp_dir="$(mktemp -d)"
          if curl -fsSL --retry 3 --retry-delay 5 "$TARBALL_URL" -o "${tmp_dir}/foundry.tar.gz" && \
             tar -tf "${tmp_dir}/foundry.tar.gz" > /dev/null 2>&1; then
            tar -xzf "${tmp_dir}/foundry.tar.gz" -C "$FOUNDRY_BIN"
            rm -rf "$tmp_dir"
            echo "Foundry ${RELEASE_TAG} installed successfully"
            break
          fi
          rm -rf "$tmp_dir"
          if [ "$attempt" -ge "$max_attempts" ]; then
            echo "::error::Foundry download failed after ${max_attempts} attempts"
            exit 1
          fi
          sleep_seconds=$((attempt * 10))
          echo "::warning::Foundry download attempt ${attempt} failed, retrying in ${sleep_seconds}s"
          sleep "$sleep_seconds"
          attempt=$((attempt + 1))
        done

    - name: Add Foundry to PATH
      shell: bash
      run: echo "$HOME/.foundry/bin" >> "$GITHUB_PATH"

    - name: Verify Foundry tools
      shell: bash
      run: |
        set -euo pipefail
        export PATH="$HOME/.foundry/bin:$PATH"
        forge --version
        cast --version
        anvil --version

    - name: Setup solc
      uses: ./.github/actions/setup-solc

    - name: Prepare extra Verity smoke Yul artifacts
      if: inputs.download-yul == 'true'
      shell: bash
      run: |
        set -euo pipefail

        out_dir="${{ inputs.yul-artifact-path }}"
        compiler_bin="verity-compiler"
        compiler_args=()
        if [ "${{ inputs.yul-artifact-name }}" = "generated-yul-patched" ]; then
          compiler_bin="verity-compiler-patched"
          compiler_args+=(--enable-patches)
        fi

        artifact_path="${out_dir}/LocalObligationMacroSmoke.yul"
        if [ -f "${artifact_path}" ]; then
          exit 0
        fi

        mkdir -p "${out_dir}"
        lake build Contracts.LocalObligationMacroSmoke.LocalObligationMacroSmoke "${compiler_bin}" >/dev/null
        "./.lake/build/bin/${compiler_bin}" \
          --module Contracts.LocalObligationMacroSmoke.LocalObligationMacroSmoke \
          --output "${out_dir}" \
          "${compiler_args[@]}" >/dev/null
